
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡A que lo Sabes! · Folclore Canario</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Work+Sans:wght@400;500;600;700&display=swap');
        :root{
            --basalt-0:#161210;
            --basalt-1:#211a16;
            --basalt-2:#2c2420;
            --sand:#f4ead4;
            --sand-dim:#c9bba0;
            --terracota:#c1502e;
            --terracota-dark:#8f3a21;
            --terracota-light:#e07a52;
            --ocean:#1f6f78;
            --ocean-light:#4fa3ab;
            --ochre:#d4a017;
            --ochre-light:#eac35c;
            --line: rgba(244,234,212,0.12);
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{
            font-family:'Work Sans', sans-serif;
            background: radial-gradient(circle at 15% 0%, rgba(193,80,46,0.18), transparent 45%), radial-gradient(circle at 100% 20%, rgba(31,111,120,0.16), transparent 50%), var(--basalt-0);
            color:var(--sand);
            min-height:100vh;
            padding:14px;
            max-width:520px;
            margin:0 auto;
            font-size:16px;
            -webkit-tap-highlight-color: transparent;
        }
        h1{
            font-family:'Fraunces', serif;
            font-weight:800;
            font-size:1.7em;
            text-align:center;
            letter-spacing:0.5px;
            color:var(--sand);
            margin:6px 0 2px;
        }
        h1 .isla{
            display:block;
            font-family:'Work Sans', sans-serif;
            font-weight:600;
            font-size:0.32em;
            letter-spacing:3px;
            text-transform:uppercase;
            color:var(--ochre-light);
            margin-top:4px;
        }
        .subtitulo{
            text-align:center;
            color:var(--sand-dim);
            font-size:0.85em;
            margin-bottom:16px;
        }
        .panel{
            margin-top:14px;
            padding:16px;
            background:var(--basalt-1);
            border:1px solid var(--line);
            border-radius:14px;
        }
        .panel-titulo{
            font-family:'Fraunces', serif;
            font-weight:700;
            font-size:1.05em;
            color:var(--ochre-light);
            display:flex;
            align-items:center;
            gap:8px;
            margin-bottom:12px;
            padding-bottom:8px;
            border-bottom:1px solid var(--line);
        }
        button{
            font-family:'Work Sans', sans-serif;
            border:none;
            border-radius:10px;
            cursor:pointer;
            touch-action:manipulation;
            transition:transform 0.15s ease, opacity 0.15s ease;
        }
        button:active{transform:scale(0.97);}
        .btn-principal{
            display:block;
            width:100%;
            background:var(--terracota);
            color:var(--sand);
            font-weight:700;
            font-size:1.15em;
            padding:16px;
            border-radius:14px;
            box-shadow:0 6px 0 var(--terracota-dark);
        }
        .btn-principal:active{box-shadow:0 3px 0 var(--terracota-dark); transform:translateY(3px) scale(1);}
        .btn-principal:disabled{opacity:0.35; box-shadow:none; cursor:not-allowed;}
        .btn-principal.secundario{background:var(--ocean); box-shadow:0 6px 0 var(--ocean);}
        .btn-secundario{
            background:transparent;
            color:var(--sand);
            border:1.5px solid var(--line);
            font-size:0.85em;
            font-weight:600;
            padding:9px 14px;
        }
        .btn-secundario:hover{border-color:var(--ocean-light);}
        .btn-texto{
            background:none;
            color:var(--sand-dim);
            font-size:0.8em;
            text-decoration:underline;
            padding:6px 4px;
        }
        .btn-modalidad-juego{
            width:100%;
            padding:12px;
            border-radius:10px;
            font-weight:600;
            transition:all 0.3s;
            background:var(--basalt-1);
            color:var(--sand);
            border:2px solid var(--line);
        }
        .btn-modalidad-juego.activo{
            background:var(--terracota);
            border-color:var(--ochre);
        }
        .btn-modalidad-juego small{
            display:block;
            font-weight:400;
            font-size:0.7em;
            opacity:0.8;
        }
        .fila-botones{
            display:flex;
            flex-wrap:wrap;
            gap:8px;
            margin-top:10px;
            justify-content:center;
        }
        .acciones-menores{
            display:flex;
            justify-content:center;
            gap:14px;
            margin-top:10px;
            flex-wrap:wrap;
        }
        .input-nombre{
            padding:12px;
            font-size:16px;
            border-radius:9px;
            border:1.5px solid var(--line);
            background:var(--basalt-2);
            color:var(--sand);
            width:100%;
            margin-bottom:8px;
        }
        .input-nombre:focus{outline:none; border-color:var(--ocean-light);}
        .jugador-item{
            padding:6px 12px;
            background:var(--basalt-2);
            margin:3px;
            border-radius:20px;
            display:inline-block;
            font-size:0.9em;
            border:1px solid var(--line);
        }
        .clasificacion-container{max-height:280px; overflow-y:auto;}
        .clasificacion-item{
            padding:9px 12px;
            background:var(--basalt-2);
            margin:5px 0;
            border-radius:10px;
            display:flex;
            align-items:center;
            gap:10px;
            border-left:3px solid var(--ochre);
        }
        .clasificacion-item .posicion{
            font-family:'Fraunces', serif;
            font-weight:700;
            color:var(--ochre-light);
            min-width:26px;
        }
        .clasificacion-item .nombre{flex:1; font-weight:600;}
        .clasificacion-item .puntos{color:var(--terracota-light); font-weight:700;}
        .estado-juego{
            text-align:center;
            padding:12px;
            border-radius:12px;
            margin:8px 0;
            font-weight:600;
        }
        .estado-juego.ronda{
            background:rgba(212,160,23,0.12);
            border:1px solid var(--ochre);
            color:var(--ochre-light);
        }
        .estado-juego.final{
            background:rgba(193,80,46,0.12);
            border:1px solid var(--terracota);
            color:var(--terracota-light);
        }
        .billete{
            display:none;
            margin-top:16px;
            position:relative;
            background:var(--basalt-2);
            border-radius:16px;
            padding:20px 18px 18px;
            border:1px solid var(--line);
        }
        .billete::before, .billete::after{
            content:"";
            position:absolute;
            top:50%;
            width:22px;
            height:22px;
            background:var(--basalt-0);
            border-radius:50%;
            transform:translateY(-50%);
        }
        .billete::before{left:-11px;}
        .billete::after{right:-11px;}
        .billete .num{
            font-family:'Fraunces', serif;
            font-size:0.75em;
            color:var(--sand-dim);
            letter-spacing:1px;
        }
        .billete h2{
            font-family:'Fraunces', serif;
            font-size:1.2em;
            color:var(--sand);
            margin:4px 0 10px;
            line-height:1.25;
        }
        .linea-divisoria{
            border-top:1.5px dashed var(--line);
            margin:16px 0;
        }
        .opciones-grid{
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap:8px;
            margin-top:14px;
        }
        .btn-opcion{
            padding:12px 8px;
            border-radius:11px;
            border:2px solid var(--line);
            background:var(--basalt-1);
            color:var(--sand);
            font-weight:600;
            font-size:0.85em;
            transition:all 0.3s;
            text-align:center;
            min-height:60px;
            word-wrap:break-word;
        }
        .btn-opcion:active{transform:scale(0.95);}
        .btn-opcion.correcta{background:var(--ocean); border-color:var(--ocean);}
        .btn-opcion.incorrecta{background:var(--terracota); border-color:var(--terracota);}
        .btn-opcion:disabled{opacity:0.6; cursor:not-allowed; transform:none;}
        .btn-opcion .letra{
            display:block;
            font-size:0.7em;
            color:var(--sand-dim);
            margin-bottom:4px;
        }
        
        /* Temporizador */
        .temporizador-container{
            text-align:center;
            margin:10px 0;
            padding:12px;
            background:var(--basalt-2);
            border-radius:12px;
            border:1px solid var(--line);
        }
        .temporizador-container .display{
            font-size:3em;
            font-weight:800;
            font-family:'Fraunces',serif;
            color:var(--ochre-light);
            transition:color 0.3s;
        }
        .temporizador-container .display.urgente{
            color:var(--terracota-light);
            animation:pulso 0.5s ease infinite;
        }
        .btn-tiempo{
            padding:6px 12px;
            border-radius:8px;
            background:var(--basalt-1);
            color:var(--sand);
            border:1px solid var(--line);
            font-size:0.85em;
            cursor:pointer;
        }
        .btn-tiempo.activo{
            background:var(--ocean);
            border-color:var(--ocean-light);
        }
        @keyframes pulso{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
        
        .toast{
            position:fixed;
            bottom:18px;
            left:50%;
            transform:translateX(-50%);
            background:var(--basalt-2);
            color:var(--sand);
            padding:12px 20px;
            border-radius:12px;
            border:1px solid var(--ochre);
            z-index:1000;
            font-size:0.85em;
            max-width:90%;
            text-align:center;
            animation:subir 0.25s ease;
        }
        @keyframes subir{from{opacity:0; transform:translate(-50%,15px);} to{opacity:1; transform:translate(-50%,0);}}
        .clasificacion-final{
            border:2px solid var(--ochre);
            border-radius:16px;
            padding:18px;
            margin-top:12px;
            background:rgba(212,160,23,0.08);
            text-align:center;
        }
        .clasificacion-final h2{font-family:'Fraunces',serif; color:var(--ochre-light); margin-bottom:4px;}
        .clasificacion-final p{color:var(--sand-dim); font-size:0.85em; margin-bottom:14px;}
        .explicacion{
            font-size:0.8em;
            color:var(--sand-dim);
            margin-top:8px;
            padding:8px;
            background:var(--basalt-2);
            border-radius:8px;
            border-left:3px solid var(--ochre);
        }
        @media (max-width: 480px){
            body{padding:10px; font-size:14px;}
            h1{font-size:1.5em;}
            .opciones-grid{grid-template-columns:1fr 1fr;}
            .btn-opcion{font-size:0.75em; min-height:50px; padding:8px 4px;}
            .temporizador-container .display{font-size:2.5em;}
        }
    </style>
</head>
<body>
    <h1>¡A que lo Sabes!<span class="isla">Folclore Canario · Juego de grupo</span></h1>
    <p class="subtitulo">Demuestra cuánto sabes de indumentaria canaria</p>
    <div id="toastContainer"></div>

    <!-- ============================================================ -->
    <!-- NAVEGACIÓN ENTRE MODALIDADES                                   -->
    <!-- ============================================================ -->
    <div class="panel" style="background: var(--basalt-2); border-color: var(--ochre);">
        <div class="panel-titulo" style="border-bottom-color: var(--ochre);">🎮 Modalidades</div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <a href="index.html" style="flex: 1; min-width: 120px; text-decoration: none;">
                <button class="btn-modalidad-juego" style="width: 100%;">

                </button>
            </a>
            <a href="modalidad_taifas.html" style="flex: 1; min-width: 120px; text-decoration: none;">
                <button class="btn-modalidad-juego" style="width: 100%;">
                    🎵 Baile de Taifas <small>Segunda modalidad</small>
                </button>
            </a>
            <a href="modalidad_adivina.html" style="flex: 1; min-width: 120px; text-decoration: none;">
                <button class="btn-modalidad-juego" style="width: 100%;">
                    🎧 Pon La Oreja <small>Tercera modalidad</small>
                </button>
            </a>
            <a href="modalidad_adivina_visual.html" style="flex: 1; min-width: 120px; text-decoration: none;">
                <button class="btn-modalidad-juego" style="width: 100%;">
                    👀 Miralo bien mi niño <small>Cuarta modalidad</small>
                </button>
            </a>
            <a href="modalidad_saber.html" style="flex: 1; min-width: 120px; text-decoration: none;">
                <button class="btn-modalidad-juego activo" style="width: 100%;">
                    📝 ¡A que lo Sabes! <small>Nueva modalidad</small>
                </button>
            </a>
            <a href="modalidad_islas.html" style="flex: 1; min-width: 120px; text-decoration: none;">
                <button class="btn-modalidad-juego" style="width: 100%;">
                    👗 Adivina La Isla <small>Nueva modalidad</small>
                </button>
            </a>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- PANEL DE JUGADORES                                             -->
    <!-- ============================================================ -->
    <div class="panel">
        <div class="panel-titulo">👥 Jugadores</div>
        <input type="text" id="nombreJugador" class="input-nombre" placeholder="Nombre del jugador">
        <div class="fila-botones">
            <button class="btn-secundario" onclick="añadirJugador()">➕ Añadir</button>
            <button class="btn-secundario" onclick="barajarOrden()">🔀 Barajar</button>
            <button class="btn-secundario" onclick="eliminarJugadores()">🗑️ Vaciar</button>
        </div>
        <div id="listaJugadores" style="margin-top:10px;"></div>
    </div>

    <!-- ============================================================ -->
    <!-- PANEL DE PARTIDA                                               -->
    <!-- ============================================================ -->
    <div class="panel">
        <div class="panel-titulo">🎲 Partida</div>
        <div id="infoPartida" style="font-size:0.85em; color:var(--sand-dim); margin-bottom:8px; text-align:center;">
            Mínimo 1 jugador para empezar
        </div>
        <button class="btn-principal" onclick="iniciarPartida()" id="btnIniciarPartida">📝 Iniciar ¡A que lo Sabes!</button>
        <div class="acciones-menores">
            <button class="btn-texto" onclick="terminarPartida()" id="btnTerminarPartida" style="display:none;">🏁 Terminar partida</button>
            <button class="btn-texto" onclick="exportarPartida()">💾 Guardar</button>
            <button class="btn-texto" onclick="cargarPartida()">📂 Cargar</button>
            <button class="btn-texto" onclick="reiniciarPartida()">🔄 Reiniciar</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- CLASIFICACIÓN                                                  -->
    <!-- ============================================================ -->
    <div class="panel" id="panelClasificacion">
        <div class="panel-titulo">🏆 Clasificación</div>
        <div id="clasificacionContainer" class="clasificacion-container">
            <p style="color:var(--sand-dim); font-size:0.85em;">Aún no hay puntuaciones.</p>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ESTADO DEL JUEGO                                               -->
    <!-- ============================================================ -->
    <div id="estadoJuego" class="estado-juego" style="display:none;"></div>

    <!-- ============================================================ -->
    <!-- ZONA DE JUEGO                                                  -->
    <!-- ============================================================ -->
    <div id="zonaJuego" class="billete" style="display:none;">
        <div class="num" id="numeroPregunta"></div>
        <h2 id="tituloPregunta"></h2>
        
        <div style="text-align:center; font-size:0.9em; color:var(--ochre-light); margin:10px 0;">
            🎯 Responde: <span id="nombreJugadorTurno" style="font-weight:700;"></span>
        </div>

        <!-- 🔥 TEMPORIZADOR -->
        <div class="temporizador-container">
            <div style="display:flex; gap:8px; justify-content:center; margin-bottom:8px; flex-wrap:wrap;">
                <button class="btn-tiempo activo" data-tiempo="15" onclick="seleccionarTiempo(15)">15s</button>
                <button class="btn-tiempo" data-tiempo="20" onclick="seleccionarTiempo(20)">20s</button>
                <button class="btn-tiempo" data-tiempo="30" onclick="seleccionarTiempo(30)">30s</button>
                <button class="btn-tiempo" data-tiempo="60" onclick="seleccionarTiempo(60)">1min</button>
                <button onclick="iniciarTemporizador()" style="padding:6px 16px; border-radius:8px; background:var(--terracota); color:var(--sand); font-weight:700;">▶ Iniciar</button>
                <button onclick="detenerTemporizador()" style="padding:6px 16px; border-radius:8px; background:var(--basalt-1); color:var(--sand); border:1px solid var(--line);">⏹ Detener</button>
            </div>
            <div class="display" id="displayTiempo">15</div>
            <div style="font-size:0.7em; color:var(--sand-dim);">segundos</div>
        </div>

        <div id="preguntaContainer" style="font-size:1.1em; font-weight:600; margin:14px 0; color:var(--sand); text-align:center;"></div>

        <div class="opciones-grid" id="opcionesContainer"></div>

        <div id="resultadoRonda" style="display:none; margin-top:14px; padding:12px; background:var(--basalt-1); border-radius:10px;">
            <p id="mensajeResultado" style="font-weight:700;"></p>
            <p id="detalleResultado" style="font-size:0.85em; color:var(--sand-dim);"></p>
            <div id="explicacionResultado" class="explicacion" style="display:none;"></div>
        </div>

        <button id="botonSiguienteRonda" class="btn-principal secundario" style="display:none; margin-top:10px;" onclick="siguientePregunta()">
            🎯 Siguiente pregunta ➜
        </button>
    </div>

    <!-- ============================================================ -->
    <!-- CÓDIGO DEL JUEGO                                               -->
    <!-- ============================================================ -->
    <script>
        // ============================================================
        // 📝 LISTA DE PREGUNTAS
        // ============================================================
        const PREGUNTAS = [
            {
                id: 501,
                pregunta: "¿A partir de qué fecha comienza el análisis de la Indumentaria tradicional en Canarias?",
                opciones: [
                    "S. V antes de Cristo",
                    "Con Cristóbal Colón",
                    "A partir del siglo XVIII"
                ],
                correcta: 2,
                explicacion: "El análisis de la indumentaria tradicional en Canarias comienza a partir del siglo XVIII."
            },
            {
                id: 502,
                pregunta: "¿En qué se basa el estudio de la Indumentaria Tradicional?",
                opciones: [
                    "Datos/archivos/grabados",
                    "Prendas testigo",
                    "Testamentos",
                    "Todas son correctas"
                ],
                correcta: 3,
                explicacion: "El estudio de la indumentaria tradicional se basa en datos/archivos/grabados, prendas testigo y testamentos."
            }
        ];

        // ============================================================
        // TEMPORIZADOR
        // ============================================================
        let tiempoSeleccionado = 15;
        let tiempoRestante = 15;
        let temporizadorActivo = false;
        let intervalo = null;

        function seleccionarTiempo(segundos) {
            tiempoSeleccionado = segundos;
            tiempoRestante = segundos;
            actualizarDisplayTiempo();
            document.querySelectorAll('.btn-tiempo').forEach(b => b.classList.remove('activo'));
            document.querySelector(`.btn-tiempo[data-tiempo="${segundos}"]`).classList.add('activo');
            detenerTemporizador();
        }

        function iniciarTemporizador() {
            if (temporizadorActivo) {
                detenerTemporizador();
                return;
            }
            tiempoRestante = tiempoSeleccionado;
            temporizadorActivo = true;
            actualizarDisplayTiempo();
            intervalo = setInterval(() => {
                tiempoRestante--;
                actualizarDisplayTiempo();
                if (tiempoRestante <= 0) {
                    detenerTemporizador();
                    mostrarToast("⏰ ¡Tiempo!");
                }
            }, 1000);
        }

        function detenerTemporizador() {
            temporizadorActivo = false;
            if (intervalo) {
                clearInterval(intervalo);
                intervalo = null;
            }
            actualizarDisplayTiempo();
        }

        function actualizarDisplayTiempo() {
            const display = document.getElementById("displayTiempo");
            if (!display) return;
            display.textContent = tiempoRestante;
            if (tiempoRestante <= 5 && tiempoRestante > 0) {
                display.className = "display urgente";
            } else {
                display.className = "display";
            }
        }

        // ============================================================
        // ESTADO DEL JUEGO
        // ============================================================
        let jugadores = [];
        let puntuaciones = {};
        let partidaActiva = false;
        let fase = 'configuracion';
        let rondaActual = 0;
        let preguntasUsadas = [];
        let preguntaActual = null;
        let rondaResuelta = false;
        let historialRondas = [];

        // ============================================================
        // FUNCIONES AUXILIARES
        // ============================================================
        function mostrarToast(mensaje) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = mensaje;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }

        function mezclarArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ============================================================
        // FUNCIONES DE JUGADORES
        // ============================================================
        function añadirJugador() {
            if (partidaActiva) {
                mostrarToast("⚠️ La partida ya está en curso.");
                return;
            }
            const input = document.getElementById("nombreJugador");
            const nombre = input.value.trim();
            if (!nombre) {
                mostrarToast("Escribe un nombre primero.");
                return;
            }
            if (jugadores.includes(nombre)) {
                mostrarToast("Ese jugador ya está en la lista.");
                return;
            }
            jugadores.push(nombre);
            puntuaciones[nombre] = 0;
            input.value = "";
            actualizarListaJugadores();
            actualizarClasificacion();
            guardarPartidaAuto();
        }

        function eliminarJugadores() {
            if (partidaActiva) {
                mostrarToast("⚠️ La partida está en curso.");
                return;
            }
            if (!confirm("¿Vaciar la lista de jugadores?")) return;
            jugadores = [];
            puntuaciones = {};
            actualizarListaJugadores();
            actualizarClasificacion();
            document.getElementById("zonaJuego").style.display = "none";
            guardarPartidaAuto();
        }

        function barajarOrden() {
            if (jugadores.length < 2) {
                mostrarToast("Necesitas al menos 2 jugadores.");
                return;
            }
            mezclarArray(jugadores);
            actualizarListaJugadores();
            guardarPartidaAuto();
            mostrarToast("🔀 Orden barajado.");
        }

        function actualizarListaJugadores() {
            const container = document.getElementById("listaJugadores");
            if (jugadores.length === 0) {
                container.innerHTML = "<p style='color:var(--sand-dim); font-size:0.85em;'>No hay jugadores todavía.</p>";
                return;
            }
            let html = "";
            jugadores.forEach((nombre, index) => {
                html += `<div class="jugador-item">${index + 1}. ${nombre}</div>`;
            });
            container.innerHTML = html;

            const info = document.getElementById("infoPartida");
            if (jugadores.length < 1) {
                info.textContent = `Mínimo 1 jugador para empezar (actual: ${jugadores.length})`;
                info.style.color = "var(--terracota-light)";
            } else {
                info.textContent = `${jugadores.length} jugadores listos para jugar`;
                info.style.color = "var(--ocean-light)";
            }
        }

        function actualizarClasificacion() {
            const container = document.getElementById("clasificacionContainer");
            if (jugadores.length === 0) {
                container.innerHTML = "<p style='color:var(--sand-dim); font-size:0.85em;'>Aún no hay puntuaciones.</p>";
                return;
            }
            const ordenados = [...jugadores].sort((a, b) => (puntuaciones[b] || 0) - (puntuaciones[a] || 0));
            let html = "";
            ordenados.forEach((nombre, index) => {
                const posicion = index + 1;
                const medalla = posicion === 1 ? '🥇' : posicion === 2 ? '🥈' : posicion === 3 ? '🥉' : `#${posicion}`;
                html += `<div class="clasificacion-item">
                            <span class="posicion">${medalla}</span>
                            <span class="nombre">${nombre}</span>
                            <span class="puntos">${puntuaciones[nombre] || 0} pts</span>
                        </div>`;
            });
            container.innerHTML = html;
        }

        // ============================================================
        // FUNCIONES PRINCIPALES DEL JUEGO
        // ============================================================
        function iniciarPartida() {
            if (jugadores.length < 1) {
                mostrarToast("❌ Necesitas al menos 1 jugador.");
                return;
            }
            if (PREGUNTAS.length === 0) {
                mostrarToast("⏳ No hay preguntas disponibles.");
                return;
            }
            if (partidaActiva) {
                mostrarToast("⚠️ Ya hay una partida en curso.");
                return;
            }

            partidaActiva = true;
            fase = 'jugando';
            rondaActual = 0;
            preguntasUsadas = [];
            historialRondas = [];
            puntuaciones = {};
            jugadores.forEach(n => puntuaciones[n] = 0);
            actualizarClasificacion();

            document.getElementById("btnIniciarPartida").style.display = "none";
            document.getElementById("btnTerminarPartida").style.display = "inline-block";
            document.getElementById("infoPartida").textContent = "📝 ¡Partida iniciada!";

            document.getElementById("zonaJuego").style.display = "block";

            iniciarRonda();
            guardarPartidaAuto();
        }

        function iniciarRonda() {
            // Verificar si quedan preguntas
            const disponibles = PREGUNTAS.filter(p => !preguntasUsadas.includes(p.id));
            if (disponibles.length === 0) {
                mostrarToast("🎉 ¡Se han agotado todas las preguntas!");
                finalizarPartida();
                return;
            }

            // Seleccionar pregunta aleatoria
            const idx = Math.floor(Math.random() * disponibles.length);
            preguntaActual = disponibles[idx];
            preguntasUsadas.push(preguntaActual.id);

            rondaResuelta = false;

            // Elegir jugador (turno rotativo)
            const jugador = jugadores[rondaActual % jugadores.length];

            // Restaurar temporizador
            detenerTemporizador();
            tiempoRestante = tiempoSeleccionado;
            actualizarDisplayTiempo();

            // Mostrar pregunta
            document.getElementById("numeroPregunta").textContent = `PREGUNTA ${preguntaActual.id}`;
            document.getElementById("tituloPregunta").textContent = "📝 ¡A que lo Sabes!";
            document.getElementById("nombreJugadorTurno").textContent = jugador;
            document.getElementById("preguntaContainer").textContent = preguntaActual.pregunta;

            // Generar opciones (mezcladas)
            const opcionesMezcladas = mezclarArray([...preguntaActual.opciones]);
            // Guardar el índice original de la correcta para saber después cuál era
            const correctaOriginal = preguntaActual.correcta;
            // Encontrar la opción correcta en el array mezclado
            const textoCorrecto = preguntaActual.opciones[correctaOriginal];
            const indiceCorrectoMezclado = opcionesMezcladas.indexOf(textoCorrecto);

            const container = document.getElementById("opcionesContainer");
            container.innerHTML = "";
            const letras = ['A', 'B', 'C', 'D', 'E', 'F'];
            opcionesMezcladas.forEach((opcion, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-opcion';
                btn.innerHTML = `<span class="letra">${letras[index]}</span>${opcion}`;
                btn.dataset.indice = index;
                btn.onclick = () => seleccionarOpcion(index, indiceCorrectoMezclado, btn);
                container.appendChild(btn);
            });

            // Guardar el índice correcto mezclado para usarlo después
            window.indiceCorrectoMezclado = indiceCorrectoMezclado;

            document.getElementById("resultadoRonda").style.display = "none";
            document.getElementById("botonSiguienteRonda").style.display = "none";

            mostrarEstado('ronda', `📝 Pregunta ${preguntaActual.id} · Turno: ${jugador}`);
            guardarPartidaAuto();
        }

        function seleccionarOpcion(indiceSeleccionado, indiceCorrecto, btn) {
            if (rondaResuelta) return;

            const jugador = jugadores[rondaActual % jugadores.length];
            const esCorrecto = indiceSeleccionado === indiceCorrecto;

            // Bloquear todos los botones
            document.querySelectorAll('.btn-opcion').forEach(b => b.disabled = true);

            // Marcar la opción seleccionada
            if (esCorrecto) {
                btn.classList.add('correcta');
            } else {
                btn.classList.add('incorrecta');
                // Mostrar cuál era la correcta
                document.querySelectorAll('.btn-opcion').forEach(b => {
                    if (parseInt(b.dataset.indice) === indiceCorrecto) {
                        b.classList.add('correcta');
                    }
                });
            }

            rondaResuelta = true;

            // Sumar puntos
            let puntos = 0;
            if (esCorrecto) {
                puntos = 10;
                puntuaciones[jugador] = (puntuaciones[jugador] || 0) + puntos;
                mostrarToast(`✅ ¡Correcto! +${puntos} pts para ${jugador}`);
            } else {
                mostrarToast(`❌ ¡Falló! La respuesta era: ${preguntaActual.opciones[preguntaActual.correcta]}`);
            }

            actualizarClasificacion();

            // Guardar historial
            historialRondas.push({
                id: preguntaActual.id,
                jugador: jugador,
                correcto: esCorrecto,
                puntos: puntos
            });

            // Mostrar resultado
            document.getElementById("resultadoRonda").style.display = "block";
            const mensaje = document.getElementById("mensajeResultado");
            const detalle = document.getElementById("detalleResultado");
            const explicacion = document.getElementById("explicacionResultado");

            if (esCorrecto) {
                mensaje.textContent = `✅ ¡${jugador} ha acertado!`;
                mensaje.style.color = "var(--ocean-light)";
                detalle.textContent = `+${puntos} pts`;
            } else {
                mensaje.textContent = `❌ ${jugador} ha fallado`;
                mensaje.style.color = "var(--terracota-light)";
                detalle.textContent = `La respuesta correcta era: ${preguntaActual.opciones[preguntaActual.correcta]}`;
            }

            // Mostrar explicación si existe
            if (preguntaActual.explicacion) {
                explicacion.style.display = "block";
                explicacion.textContent = `💡 ${preguntaActual.explicacion}`;
            } else {
                explicacion.style.display = "none";
            }

            // Botón siguiente
            const btnSig = document.getElementById("botonSiguienteRonda");
            btnSig.style.display = "block";
            btnSig.textContent = `🎯 Siguiente pregunta ➜`;

            guardarPartidaAuto();
        }

        function siguientePregunta() {
            if (fase !== 'jugando') return;
            rondaActual++;
            iniciarRonda();
        }

        function terminarPartida() {
            if (!partidaActiva) {
                mostrarToast("⚠️ No hay una partida activa.");
                return;
            }
            if (!confirm("¿Terminar la partida? Se mostrará la clasificación final.")) return;
            finalizarPartida();
        }

        function finalizarPartida() {
            fase = 'final';
            partidaActiva = false;
            detenerTemporizador();

            const container = document.getElementById("clasificacionContainer");
            const ordenados = [...jugadores].sort((a, b) => (puntuaciones[b] || 0) - (puntuaciones[a] || 0));

            let html = `<div class="clasificacion-final">
                            <h2>🏆 Clasificación Final</h2>
                            <p>${historialRondas.length} preguntas respondidas</p>`;

            ordenados.forEach((nombre, index) => {
                const posicion = index + 1;
                const medalla = posicion === 1 ? '🥇' : posicion === 2 ? '🥈' : posicion === 3 ? '🥉' : `#${posicion}`;
                html += `<div class="clasificacion-item">
                                <span class="posicion">${medalla}</span>
                                <span class="nombre">${nombre}</span>
                                <span class="puntos">${puntuaciones[nombre] || 0} pts</span>
                            </div>`;
            });

            html += `<button class="btn-principal" style="margin-top:14px;" onclick="reiniciarPartida()">🔄 Nueva partida</button>`;
            html += `</div>`;

            container.innerHTML = html;

            document.getElementById("zonaJuego").style.display = "none";
            document.getElementById("btnIniciarPartida").style.display = "block";
            document.getElementById("btnIniciarPartida").textContent = "📝 Nueva partida";
            document.getElementById("btnTerminarPartida").style.display = "none";
            document.getElementById("infoPartida").textContent = "Partida finalizada";

            const ganador = ordenados[0];
            mostrarToast(`🏆 ¡${ganador} ha ganado!`);
            guardarPartidaAuto();
        }

        function reiniciarPartida() {
            if (!confirm("¿Reiniciar toda la partida?")) return;

            partidaActiva = false;
            fase = 'configuracion';
            rondaActual = 0;
            preguntasUsadas = [];
            historialRondas = [];
            jugadores.forEach(n => puntuaciones[n] = 0);
            detenerTemporizador();

            document.getElementById("zonaJuego").style.display = "none";
            document.getElementById("btnIniciarPartida").style.display = "block";
            document.getElementById("btnIniciarPartida").textContent = "📝 Iniciar ¡A que lo Sabes!";
            document.getElementById("btnTerminarPartida").style.display = "none";
            document.getElementById("estadoJuego").style.display = "none";
            document.getElementById("infoPartida").textContent = "Mínimo 1 jugador para empezar";
            document.getElementById("infoPartida").style.color = "var(--sand-dim)";

            actualizarClasificacion();
            actualizarListaJugadores();
            guardarPartidaAuto();
            mostrarToast("🔄 Partida reiniciada.");
        }

        function mostrarEstado(tipo, mensaje) {
            const el = document.getElementById("estadoJuego");
            el.style.display = "block";
            el.className = "estado-juego " + tipo;
            el.textContent = mensaje;
        }

        // ============================================================
        // GUARDADO Y CARGA
        // ============================================================
        function guardarPartidaAuto() {
            try {
                const datos = {
                    jugadores,
                    puntuaciones,
                    partidaActiva,
                    fase,
                    rondaActual,
                    preguntasUsadas,
                    preguntaActual: preguntaActual ? preguntaActual.id : null,
                    rondaResuelta,
                    historialRondas
                };
                localStorage.setItem('saberPartida', JSON.stringify(datos));
            } catch (e) { console.log('No se pudo autoguardar:', e); }
        }

        function cargarPartidaAuto() {
            try {
                const datos = localStorage.getItem('saberPartida');
                if (!datos) return;
                const parsed = JSON.parse(datos);
                if (!parsed.jugadores || parsed.jugadores.length === 0) return;

                jugadores = parsed.jugadores;
                puntuaciones = parsed.puntuaciones || {};
                partidaActiva = parsed.partidaActiva || false;
                fase = parsed.fase || 'configuracion';
                rondaActual = parsed.rondaActual || 0;
                preguntasUsadas = parsed.preguntasUsadas || [];
                rondaResuelta = parsed.rondaResuelta || false;
                historialRondas = parsed.historialRondas || [];

                // Recuperar pregunta actual
                if (parsed.preguntaActual) {
                    preguntaActual = PREGUNTAS.find(p => p.id === parsed.preguntaActual) || null;
                }

                actualizarListaJugadores();
                actualizarClasificacion();

                if (partidaActiva && fase === 'jugando') {
                    document.getElementById("btnIniciarPartida").style.display = "none";
                    document.getElementById("btnTerminarPartida").style.display = "inline-block";
                    document.getElementById("infoPartida").textContent = "📝 Partida en curso";

                    if (preguntaActual && !rondaResuelta) {
                        document.getElementById("zonaJuego").style.display = "block";
                        const jugador = jugadores[rondaActual % jugadores.length];
                        document.getElementById("numeroPregunta").textContent = `PREGUNTA ${preguntaActual.id}`;
                        document.getElementById("tituloPregunta").textContent = "📝 ¡A que lo Sabes!";
                        document.getElementById("nombreJugadorTurno").textContent = jugador;
                        document.getElementById("preguntaContainer").textContent = preguntaActual.pregunta;

                        // Reconstruir opciones
                        const container = document.getElementById("opcionesContainer");
                        container.innerHTML = "";
                        const letras = ['A', 'B', 'C', 'D', 'E', 'F'];
                        // Mezclar opciones para mantener el mismo orden que en la partida original
                        const opcionesMezcladas = mezclarArray([...preguntaActual.opciones]);
                        const textoCorrecto = preguntaActual.opciones[preguntaActual.correcta];
                        const indiceCorrectoMezclado = opcionesMezcladas.indexOf(textoCorrecto);
                        window.indiceCorrectoMezclado = indiceCorrectoMezclado;

                        opcionesMezcladas.forEach((opcion, index) => {
                            const btn = document.createElement('button');
                            btn.className = 'btn-opcion';
                            btn.innerHTML = `<span class="letra">${letras[index]}</span>${opcion}`;
                            btn.dataset.indice = index;
                            btn.onclick = () => seleccionarOpcion(index, indiceCorrectoMezclado, btn);
                            container.appendChild(btn);
                        });

                        document.getElementById("resultadoRonda").style.display = "none";
                        document.getElementById("botonSiguienteRonda").style.display = "none";
                        mostrarEstado('ronda', `📝 Pregunta ${preguntaActual.id} · Turno: ${jugador}`);
                    } else if (rondaResuelta) {
                        document.getElementById("zonaJuego").style.display = "block";
                        document.getElementById("resultadoRonda").style.display = "block";
                        document.getElementById("botonSiguienteRonda").style.display = "block";
                        document.querySelectorAll('.btn-opcion').forEach(b => b.disabled = true);
                    }
                }

                console.log('✅ Partida de ¡A que lo Sabes! cargada automáticamente');
            } catch (e) { console.log('Error cargando partida:', e); }
        }

        function exportarPartida() {
            const datos = {
                jugadores,
                puntuaciones,
                partidaActiva,
                fase,
                rondaActual,
                preguntasUsadas,
                preguntaActual: preguntaActual ? preguntaActual.id : null,
                rondaResuelta,
                historialRondas,
                fecha: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(datos, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `saber_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            mostrarToast("💾 Partida exportada.");
        }

        function cargarPartida() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const datos = JSON.parse(event.target.result);
                        jugadores = datos.jugadores || [];
                        puntuaciones = datos.puntuaciones || {};
                        partidaActiva = datos.partidaActiva || false;
                        fase = datos.fase || 'configuracion';
                        rondaActual = datos.rondaActual || 0;
                        preguntasUsadas = datos.preguntasUsadas || [];
                        rondaResuelta = datos.rondaResuelta || false;
                        historialRondas = datos.historialRondas || [];

                        if (datos.preguntaActual) {
                            preguntaActual = PREGUNTAS.find(p => p.id === datos.preguntaActual) || null;
                        }

                        actualizarListaJugadores();
                        actualizarClasificacion();

                        if (partidaActiva && fase === 'jugando') {
                            document.getElementById("btnIniciarPartida").style.display = "none";
                            document.getElementById("btnTerminarPartida").style.display = "inline-block";
                            document.getElementById("infoPartida").textContent = "📝 Partida en curso";
                            document.getElementById("zonaJuego").style.display = "block";

                            if (preguntaActual && !rondaResuelta) {
                                const jugador = jugadores[rondaActual % jugadores.length];
                                document.getElementById("numeroPregunta").textContent = `PREGUNTA ${preguntaActual.id}`;
                                document.getElementById("tituloPregunta").textContent = "📝 ¡A que lo Sabes!";
                                document.getElementById("nombreJugadorTurno").textContent = jugador;
                                document.getElementById("preguntaContainer").textContent = preguntaActual.pregunta;

                                const container = document.getElementById("opcionesContainer");
                                container.innerHTML = "";
                                const letras = ['A', 'B', 'C', 'D', 'E', 'F'];
                                const opcionesMezcladas = mezclarArray([...preguntaActual.opciones]);
                                const textoCorrecto = preguntaActual.opciones[preguntaActual.correcta];
                                const indiceCorrectoMezclado = opcionesMezcladas.indexOf(textoCorrecto);
                                window.indiceCorrectoMezclado = indiceCorrectoMezclado;

                                opcionesMezcladas.forEach((opcion, index) => {
                                    const btn = document.createElement('button');
                                    btn.className = 'btn-opcion';
                                    btn.innerHTML = `<span class="letra">${letras[index]}</span>${opcion}`;
                                    btn.dataset.indice = index;
                                    btn.onclick = () => seleccionarOpcion(index, indiceCorrectoMezclado, btn);
                                    container.appendChild(btn);
                                });

                                document.getElementById("resultadoRonda").style.display = "none";
                                document.getElementById("botonSiguienteRonda").style.display = "none";
                            } else if (rondaResuelta) {
                                document.getElementById("resultadoRonda").style.display = "block";
                                document.getElementById("botonSiguienteRonda").style.display = "block";
                                document.querySelectorAll('.btn-opcion').forEach(b => b.disabled = true);
                            }
                        }

                        guardarPartidaAuto();
                        mostrarToast("📂 Partida cargada.");
                    } catch (e) {
                        mostrarToast("Error al leer el archivo.");
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // ============================================================
        // INICIO DE LA APLICACIÓN
        // ============================================================
        function iniciarApp() {
            if (typeof PREGUNTAS === 'undefined' || PREGUNTAS.length === 0) {
                console.error('❌ Error: PREGUNTAS no está definido o está vacío.');
                mostrarToast('⚠️ Error: No hay preguntas disponibles.');
                return;
            }

            cargarPartidaAuto();
            actualizarListaJugadores();
            console.log(`✅ App "¡A que lo Sabes!" iniciada. ${PREGUNTAS.length} preguntas cargadas.`);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', iniciarApp);
        } else {
            iniciarApp();
        }
    </script>

</body>
</html>
