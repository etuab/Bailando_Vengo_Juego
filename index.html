<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Juego de Baile</title>
</head>
<body>
    <h1>🎵 Juego de Baile</h1>
    <button onclick="saludar()">Púlsame</button>
    <p id="mensaje"></p>

    <script>
        function saludar() {
            document.getElementById("mensaje").textContent = "¡Has pulsado el botón!";
        }
        console.log("✅ Script cargado");
    </script>
</body>
</html>
