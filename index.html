<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baile a Ciegas · Folclore Canario</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Work+Sans:wght@400;500;600;700&display=swap');
        :root{
            --basalt-0:#161210;
            --basalt-1:#211a16;
            --basalt-2:#2c2420;
            --sand:#f4ead4;
            --sand-dim:#c9bba0;
            --terracota:#c1502e;
            --terracota-dark:#8f3a21;
            --terracota-light:#e07a52;
            --ocean:#1f6f78;
            --ocean-light:#4fa3ab;
            --ochre:#d4a017;
            --ochre-light:#eac35c;
            --line: rgba(244,234,212,0.12);
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{
            font-family:'Work Sans', sans-serif;
            background: radial-gradient(circle at 15% 0%, rgba(193,80,46,0.18), transparent 45%), radial-gradient(circle at 100% 20%, rgba(31,111,120,0.16), transparent 50%), var(--basalt-0);
            color:var(--sand);
            min-height:100vh;
            padding:14px;
            max-width:520px;
            margin:0 auto;
            font-size:16px;
            -webkit-tap-highlight-color: transparent;
        }
        h1{
            font-family:'Fraunces', serif;
            font-weight:800;
            font-size:1.7em;
            text-align:center;
            letter-spacing:0.5px;
            color:var(--sand);
            margin:6px 0 2px;
        }
        h1 .isla{
            display:block;
            font-family:'Work Sans', sans-serif;
            font-weight:600;
            font-size:0.32em;
            letter-spacing:3px;
            text-transform:uppercase;
            color:var(--ochre-light);
            margin-top:4px;
        }
        .subtitulo{
            text-align:center;
            color:var(--sand-dim);
            font-size:0.85em;
            margin-bottom:16px;
        }
        .panel{
            margin-top:14px;
            padding:16px;
            background:var(--basalt-1);
            border:1px solid var(--line);
            border-radius:14px;
        }
        .panel-titulo{
            font-family:'Fraunces', serif;
            font-weight:700;
            font-size:1.05em;
            color:var(--ochre-light);
            display:flex;
            align-items:center;
            gap:8px;
            margin-bottom:12px;
            padding-bottom:8px;
            border-bottom:1px solid var(--line);
        }
        button{
            font-family:'Work Sans', sans-serif;
            border:none;
            border-radius:10px;
            cursor:pointer;
            touch-action:manipulation;
            transition:transform 0.15s ease, opacity 0.15s ease;
        }
        button:active{transform:scale(0.97);}
        .btn-principal{
            display:block;
            width:100%;
            background:var(--terracota);
            color:var(--sand);
            font-weight:700;
            font-size:1.15em;
            padding:16px;
            border-radius:14px;
            box-shadow:0 6px 0 var(--terracota-dark);
        }
        .btn-principal:active{box-shadow:0 3px 0 var(--terracota-dark); transform:translateY(3px) scale(1);}
        .btn-principal:disabled{opacity:0.35; box-shadow:none; cursor:not-allowed;}
        .btn-secundario{
            background:transparent;
            color:var(--sand);
            border:1.5px solid var(--line);
            font-size:0.85em;
            font-weight:600;
            padding:9px 14px;
        }
        .btn-secundario:hover{border-color:var(--ocean-light);}
        .btn-texto{
            background:none;
            color:var(--sand-dim);
            font-size:0.8em;
            text-decoration:underline;
            padding:6px 4px;
        }
        .btn-modalidad-juego{
            width:100%;
            padding:12px;
            border-radius:10px;
            font-weight:600;
            transition:all 0.3s;
            background:var(--basalt-1);
            color:var(--sand);
            border:2px solid var(--line);
        }
        .btn-modalidad-juego.activo{
            background:var(--terracota);
            border-color:var(--ochre);
        }
        .btn-modalidad-juego small{
            display:block;
            font-weight:400;
            font-size:0.7em;
            opacity:0.8;
        }
        .fila-botones{
            display:flex;
            flex-wrap:wrap;
            gap:8px;
            margin-top:10px;
            justify-content:center;
        }
        .acciones-menores{
            display:flex;
            justify-content:center;
            gap:14px;
            margin-top:10px;
            flex-wrap:wrap;
        }
        .input-nombre{
            padding:12px;
            font-size:16px;
            border-radius:9px;
            border:1.5px solid var(--line);
            background:var(--basalt-2);
            color:var(--sand);
            width:100%;
            margin-bottom:8px;
        }
        .input-nombre:focus{outline:none; border-color:var(--ocean-light);}
        .jugador-item{
            padding:6px 12px;
            background:var(--basalt-2);
            margin:3px;
            border-radius:20px;
            display:inline-block;
            font-size:0.9em;
            border:1px solid var(--line);
        }
        .jugador-item.turno{border-color:var(--ochre); color:var(--ochre-light); font-weight:600;}
        .turno-actual{
            padding:18px;
            border-radius:16px;
            margin:14px 0;
            text-align:center;
            background:linear-gradient(160deg, rgba(212,160,23,0.14), rgba(193,80,46,0.10));
            border:1.5px solid var(--ochre);
            display:none;
        }
        .turno-actual .etiqueta{
            font-size:0.75em;
            letter-spacing:2px;
            text-transform:uppercase;
            color:var(--sand-dim);
        }
        .turno-actual .nombre{
            font-family:'Fraunces', serif;
            font-weight:800;
            color:var(--ochre-light);
            font-size:1.9em;
            display:block;
            margin-top:2px;
        }
        .turno-actual.nuevo-turno{animation:pulso 0.8s ease 2;}
        @keyframes pulso{0%,100%{transform:scale(1);}50%{transform:scale(1.02);}}
        .votacion-activa{
            background:var(--terracota);
            color:var(--sand);
            padding:3px 12px;
            border-radius:20px;
            display:inline-block;
            margin-top:8px;
            font-size:0.75em;
            font-weight:600;
        }
        .bailes-restantes{
            text-align:center;
            font-size:0.85em;
            color:var(--ocean-light);
            margin:4px 0 10px;
            font-weight:600;
        }
        .bailes-restantes.agotados{color:var(--terracota-light);}
        .clasificacion-container{max-height:280px; overflow-y:auto;}
        .clasificacion-item{
            padding:9px 12px;
            background:var(--basalt-2);
            margin:5px 0;
            border-radius:10px;
            display:flex;
            align-items:center;
            gap:10px;
            border-left:3px solid var(--ochre);
        }
        .clasificacion-item .posicion{
            font-family:'Fraunces', serif;
            font-weight:700;
            color:var(--ochre-light);
            min-width:26px;
        }
        .clasificacion-item .nombre{flex:1; font-weight:600;}
        .clasificacion-item .puntos{color:var(--terracota-light); font-weight:700;}
        .billete{
            display:none;
            margin-top:16px;
            position:relative;
            background:var(--basalt-2);
            border-radius:16px;
            padding:20px 18px 18px;
            border:1px solid var(--line);
        }
        .billete::before, .billete::after{
            content:"";
            position:absolute;
            top:50%;
            width:22px;
            height:22px;
            background:var(--basalt-0);
            border-radius:50%;
            transform:translateY(-50%);
        }
        .billete::before{left:-11px;}
        .billete::after{right:-11px;}
        .billete .num{
            font-family:'Fraunces', serif;
            font-size:0.75em;
            color:var(--sand-dim);
            letter-spacing:1px;
        }
        .billete h2{
            font-family:'Fraunces', serif;
            font-size:1.3em;
            color:var(--sand);
            margin:4px 0 10px;
            line-height:1.25;
        }
        .sello-estrellas{
            display:inline-flex;
            align-items:center;
            gap:6px;
            border:2px solid var(--ochre);
            color:var(--ochre-light);
            border-radius:30px;
            padding:5px 14px;
            font-weight:700;
            font-size:0.9em;
            transform:rotate(-2deg);
        }
        .linea-divisoria{
            border-top:1.5px dashed var(--line);
            margin:16px 0;
        }
        .puntos-info{
            display:flex;
            justify-content:space-around;
            text-align:center;
            margin-bottom:14px;
            font-size:0.85em;
            color:var(--sand-dim);
        }
        .puntos-info b{display:block; color:var(--sand); font-size:1.3em; font-family:'Fraunces',serif;}
        .enlace-video{
            display:block;
            text-align:center;
            color:var(--ocean-light);
            text-decoration:none;
            font-weight:600;
            margin-bottom:14px;
            padding:10px;
            border:1.5px solid var(--ocean);
            border-radius:10px;
        }
        .enlace-video:active{background:rgba(31,111,120,0.15);}
        .modalidad-row{display:flex; gap:8px; margin-bottom:6px;}
        .btn-modalidad{
            flex:1;
            padding:13px 8px;
            border-radius:11px;
            border:1.5px solid var(--line);
            background:var(--basalt-1);
            color:var(--sand);
            font-weight:600;
            font-size:0.92em;
        }
        .btn-modalidad.activo-verde{background:var(--ocean); border-color:var(--ocean); color:var(--sand);}
        .btn-modalidad.activo-naranja{background:var(--terracota); border-color:var(--terracota); color:var(--sand);}
        .modalidad-nota{text-align:center; font-size:0.8em; color:var(--sand-dim); margin-top:6px; min-height:1.2em;}
        .seccion-votacion{margin-top:16px;}
        .turno-votacion{text-align:center; font-size:1em; margin-bottom:4px; color:var(--sand-dim);}
        .jugador-votando{color:var(--ochre-light); font-weight:700; font-size:1.2em; font-family:'Fraunces',serif;}
        .votos-row{display:flex; gap:10px; margin-top:14px;}
        .voto-boton{
            flex:1;
            font-size:1.6em;
            padding:16px 8px;
            border:2px solid var(--line);
            border-radius:14px;
            background:var(--basalt-1);
            color:var(--sand);
        }
        .voto-boton span{display:block; font-size:0.4em; font-weight:600; margin-top:4px;}
        .voto-boton.si{border-color:var(--ocean);}
        .voto-boton.no{border-color:var(--terracota);}
        .voto-boton.seleccionado.si{background:var(--ocean);}
        .voto-boton.seleccionado.no{background:var(--terracota);}
        .resultado-votacion{
            margin-top:14px;
            padding:12px;
            background:var(--basalt-1);
            border-radius:10px;
            font-size:0.85em;
            color:var(--sand-dim);
            display:none;
        }
        .resultado-puntos{
            display:none;
            text-align:center;
            padding:22px 14px;
            border-radius:16px;
            margin:16px 0;
            font-family:'Fraunces', serif;
        }
        .resultado-puntos.aprobado{background:rgba(31,111,120,0.18); border:2px solid var(--ocean);}
        .resultado-puntos.reprobado{background:rgba(193,80,46,0.14); border:2px solid var(--terracota);}
        .resultado-puntos .puntos-grande{font-size:2em; font-weight:800; display:block;}
        .resultado-puntos .votos-detalle{
            display:flex;
            justify-content:center;
            gap:24px;
            margin-top:10px;
            font-family:'Work Sans',sans-serif;
            font-size:0.55em;
            color:var(--sand-dim);
        }
        .toast{
            position:fixed;
            bottom:18px;
            left:50%;
            transform:translateX(-50%);
            background:var(--basalt-2);
            color:var(--sand);
            padding:12px 20px;
            border-radius:12px;
            border:1px solid var(--ochre);
            z-index:1000;
            font-size:0.85em;
            max-width:90%;
            text-align:center;
            animation:subir 0.25s ease;
        }
        @keyframes subir{from{opacity:0; transform:translate(-50%,15px);} to{opacity:1; transform:translate(-50%,0);}}
        .clasificacion-final{
            border:2px solid var(--ochre);
            border-radius:16px;
            padding:18px;
            margin-top:12px;
            background:rgba(212,160,23,0.08);
            text-align:center;
        }
        .clasificacion-final h2{font-family:'Fraunces',serif; color:var(--ochre-light); margin-bottom:4px;}
        .clasificacion-final p{color:var(--sand-dim); font-size:0.85em; margin-bottom:14px;}
        @media (max-width: 480px){
            body{padding:10px; font-size:14px;}
            h1{font-size:1.5em;}
            .voto-boton{font-size:1.4em; padding:12px 6px;}
            .billete h2{font-size:1em;}
        }
    </style>
</head>
<body>
    <h1>Baile a Ciegas<span class="isla">Folclore Canario · Juego de grupo</span></h1>
    <p class="subtitulo">Sortea, decide, baila y que el grupo lo juzgue</p>
    <div id="toastContainer"></div>

    <!-- ============================================================ -->
    <!-- NAVEGACIÓN ENTRE MODALIDADES (4 BOTONES)                      -->
    <!-- ============================================================ -->
    <div class="panel" style="background: var(--basalt-2); border-color: var(--ochre);">
        <div class="panel-titulo" style="border-bottom-color: var(--ochre);">🎮 Modalidades</div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <a href="index.html" style="flex: 1; min-width: 120px; text-decoration: none;">
                <button class="btn-modalidad-juego activo" style="width: 100%;">
                    🕺 Baile a Ciegas <small>Modalidad actual</small>
                </button>
            </a>
            <a href="modalidad_taifas.html" style="flex: 1; min-width: 120px; text-decoration: none;">
                <button class="btn-modalidad-juego" style="width: 100%;">
                    🎵 Baile de Taifas <small>Segunda modalidad</small>
                </button>
            </a>
            <a href="modalidad_adivina.html" style="flex: 1; min-width: 120px; text-decoration: none;">
                <button class="btn-modalidad-juego" style="width: 100%;">
                    🎧 Adivina (Música) <small>Tercera modalidad</small>
                </button>
            </a>
            <a href="modalidad_adivina_visual.html" style="flex: 1; min-width: 120px; text-decoration: none;">
                <button class="btn-modalidad-juego" style="width: 100%;">
                    👀 Adivina Visual <small>Cuarta modalidad</small>
                </button>
            </a>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- PANEL DE JUGADORES                                             -->
    <!-- ============================================================ -->
    <div class="panel">
        <div class="panel-titulo">👥 Jugadores</div>
        <input type="text" id="nombreJugador" class="input-nombre" placeholder="Nombre del jugador">
        <div class="fila-botones">
            <button class="btn-secundario" onclick="añadirJugador()">➕ Añadir</button>
            <button class="btn-secundario" onclick="barajarOrden()">🔀 Barajar orden</button>
            <button class="btn-secundario" onclick="eliminarJugadores()">🗑️ Vaciar lista</button>
        </div>
        <div id="listaJugadores" style="margin-top:10px;"></div>
    </div>

    <!-- ============================================================ -->
    <!-- TURNO ACTUAL                                                   -->
    <!-- ============================================================ -->
    <div id="turnoActual" class="turno-actual">
        <span class="etiqueta">Turno de</span>
        <span class="nombre" id="nombreTurno"></span>
        <div><span id="estadoVotacion" class="votacion-activa" style="display:none;">🗳️ Votación en curso</span></div>
    </div>

    <!-- ============================================================ -->
    <!-- PANEL DE PARTIDA                                               -->
    <!-- ============================================================ -->
    <div class="panel">
        <div class="panel-titulo">🎲 Partida</div>
        <div class="bailes-restantes" id="bailesRestantes">Cargando bailes...</div>
        <button class="btn-principal" onclick="sortearBaile()" id="btnSortearBaile">🎲 Sortear baile</button>
        <div class="acciones-menores">
            <button class="btn-texto" onclick="saltarTurno()">Saltar turno</button>
            <button class="btn-texto" onclick="exportarPartida()">Guardar en archivo</button>
            <button class="btn-texto" onclick="cargarPartida()">Cargar archivo</button>
            <button class="btn-texto" onclick="finalizarPartida()">Finalizar partida</button>
            <button class="btn-texto" onclick="reiniciarPartida()">Reiniciar todo</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- CLASIFICACIÓN                                                  -->
    <!-- ============================================================ -->
    <div class="panel" id="panelClasificacion">
        <div class="panel-titulo">🏆 Clasificación</div>
        <div id="clasificacionContainer" class="clasificacion-container">
            <p style="color:var(--sand-dim); font-size:0.85em;">Aún no hay puntuaciones.</p>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- RESULTADO (BILLETE)                                            -->
    <!-- ============================================================ -->
    <div id="resultado" class="billete">
        <div class="num" id="numeroBaile"></div>
        <h2 id="nombreBaile"></h2>
        <span class="sello-estrellas" id="selloEstrellas"></span>
        <a id="enlaceBaile" href="#" target="_blank" class="enlace-video" rel="noopener noreferrer">🎬 Ver vídeo de referencia</a>
        <div class="linea-divisoria"></div>
        <div style="font-weight:600; margin-bottom:8px; text-align:center; color:var(--sand-dim); font-size:0.85em;">¿CÓMO QUIERE BAILARLO?</div>
        <div class="modalidad-row">
            <button class="btn-modalidad" id="btnSinRed" onclick="elegirModalidad('sinred')">🎪 Sin red<br><small id="puntosSinRedTxt"></small></button>
            <button class="btn-modalidad" id="btnChuleta" onclick="elegirModalidad('chuleta')">🎬 Con chuleta<br><small id="puntosChuletaTxt"></small></button>
        </div>
        <p class="modalidad-nota" id="modalidadSeleccionada"></p>
        <div class="seccion-votacion" id="seccionVotacion">
            <button class="btn-principal" onclick="iniciarVotacion()" id="btnIniciarVotacion">🗳️ Iniciar votación</button>
            <div id="votacionPanel" style="display:none; margin-top:14px;">
                <div class="turno-votacion">Votando: <span class="jugador-votando" id="votacionJugador"></span> <span id="progresoVotacion" style="font-size:0.75em;"></span></div>
                <div class="votos-row">
                    <button class="voto-boton si" onclick="votar('bien')">👍<span>¡Bien!</span></button>
                    <button class="voto-boton no" onclick="votar('mal')">👎<span>Mejorable</span></button>
                </div>
                <div style="text-align:center;">
                    <button class="btn-texto" onclick="deshacerVoto()">↩️ Deshacer último voto</button>
                </div>
                <div id="resultadoVotacion" class="resultado-votacion">
                    <p id="votosResumen"></p>
                </div>
                <div id="resultadoPuntosGrande" class="resultado-puntos"></div>
                <button id="botonSiguienteBaile" class="btn-principal" style="display:none;" onclick="siguienteBaile()">🎯 Siguiente baile ➜</button>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- CÓDIGO DEL JUEGO                                               -->
    <!-- ============================================================ -->
    <script>

        // ============================================================
        // CÓDIGO DEL JUEGO
        // ============================================================
        let jugadores = [];
        let puntuaciones = {};
        let turnoActual = 0;
        let bailesUsados = [];
        let baileActual = null;
        let modalidadActual = null;
        let votacionActiva = false;
        let votos = [];
        let jugadorVotado = null;
        let votantesPendientes = [];
        let indiceVotante = 0;
        let partidaFinalizada = false;
        let timeoutResultado = null;
        let ultimoVoto = null;

        function mostrarToast(mensaje) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = mensaje;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }

        function actualizarBailesRestantes() {
            if (typeof BAILES === 'undefined') {
                document.getElementById("bailesRestantes").textContent = "⚠️ Bailes no cargados";
                return;
            }
            const restantes = BAILES.length - bailesUsados.length;
            const el = document.getElementById("bailesRestantes");
            el.textContent = restantes > 0 ? `${restantes} bailes disponibles` : "¡Se han bailado todos!";
            el.classList.toggle('agotados', restantes === 0);
            document.getElementById('btnSortearBaile').disabled = (restantes === 0);
        }

        function actualizarListaJugadores() {
            const container = document.getElementById("listaJugadores");
            if (jugadores.length === 0) {
                container.innerHTML = "<p style='color:var(--sand-dim); font-size:0.85em;'>No hay jugadores todavía.</p>";
                return;
            }
            let html = "";
            jugadores.forEach((nombre, index) => {
                const esTurno = (index === turnoActual && !partidaFinalizada);
                html += `<div class="jugador-item ${esTurno ? 'turno' : ''}">${index + 1}. ${nombre}${esTurno ? ' 👑' : ''}</div>`;
            });
            container.innerHTML = html;
        }

        function mostrarTurnoActual(nuevoTurno = false) {
            if (jugadores.length === 0 || partidaFinalizada) return;
            const nombre = jugadores[turnoActual];
            const el = document.getElementById("turnoActual");
            document.getElementById("nombreTurno").textContent = nombre;
            el.style.display = "block";
            el.classList.remove('nuevo-turno');
            if (nuevoTurno) {
                el.classList.add('nuevo-turno');
                setTimeout(() => el.classList.remove('nuevo-turno'), 1600);
            }
            actualizarListaJugadores();
        }

        function actualizarClasificacion() {
            const container = document.getElementById("clasificacionContainer");
            if (jugadores.length === 0) {
                container.innerHTML = "<p style='color:var(--sand-dim); font-size:0.85em;'>Aún no hay puntuaciones.</p>";
                return;
            }
            const ordenados = [...jugadores].sort((a, b) => puntuaciones[b] - puntuaciones[a]);
            let html = "";
            ordenados.forEach((nombre, index) => {
                const posicion = index + 1;
                const medalla = posicion === 1 ? '🥇' : posicion === 2 ? '🥈' : posicion === 3 ? '🥉' : `#${posicion}`;
                html += `<div class="clasificacion-item"><span class="posicion">${medalla}</span><span class="nombre">${nombre}</span><span class="puntos">${puntuaciones[nombre]} pts</span></div>`;
            });
            container.innerHTML = html;
            actualizarBailesRestantes();
        }

        function añadirJugador() {
            if (partidaFinalizada) {
                mostrarToast("La partida ha finalizado. Reinicia para añadir jugadores.");
                return;
            }
            const input = document.getElementById("nombreJugador");
            const nombre = input.value.trim();
            if (!nombre) {
                mostrarToast("Escribe un nombre primero.");
                return;
            }
            if (jugadores.includes(nombre)) {
                mostrarToast("Ese jugador ya está en la lista.");
                return;
            }
            jugadores.push(nombre);
            puntuaciones[nombre] = 0;
            input.value = "";
            actualizarListaJugadores();
            actualizarClasificacion();
            if (jugadores.length === 1) {
                turnoActual = 0;
                mostrarTurnoActual(true);
            }
            guardarPartidaAuto();
        }

        function eliminarJugadores() {
            if (partidaFinalizada) {
                mostrarToast("Reinicia la partida primero.");
                return;
            }
            if (!confirm("¿Vaciar la lista de jugadores?")) return;
            jugadores = [];
            puntuaciones = {};
            turnoActual = 0;
            partidaFinalizada = false;
            actualizarListaJugadores();
            actualizarClasificacion();
            document.getElementById("turnoActual").style.display = "none";
            document.getElementById("resultado").style.display = "none";
            document.getElementById("seccionVotacion").style.display = "block";
            actualizarBailesRestantes();
            guardarPartidaAuto();
        }

        function barajarOrden() {
            if (jugadores.length < 2) {
                mostrarToast("Necesitas al menos 2 jugadores.");
                return;
            }
            for (let i = jugadores.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [jugadores[i], jugadores[j]] = [jugadores[j], jugadores[i]];
            }
            turnoActual = 0;
            actualizarListaJugadores();
            mostrarTurnoActual(true);
            guardarPartidaAuto();
            mostrarToast("🔀 Orden barajado.");
        }

        function sortearBaile() {
            if (partidaFinalizada) {
                mostrarToast("La partida ha finalizado.");
                return;
            }
            if (jugadores.length === 0) {
                mostrarToast("Añade jugadores primero.");
                return;
            }
            if (typeof BAILES === 'undefined') {
                mostrarToast('⏳ La lista de bailes no está cargada.');
                return;
            }
            if (votacionActiva) {
                mostrarToast("Hay una votación activa. Finalízala primero.");
                return;
            }
            let disponibles = BAILES.filter(b => !bailesUsados.includes(b.id));
            if (disponibles.length === 0) {
                mostrarToast("🎉 ¡Ya se han bailado todos los bailes!");
                return;
            }
            let baile = disponibles[Math.floor(Math.random() * disponibles.length)];
            bailesUsados.push(baile.id);
            baileActual = baile;
            modalidadActual = null;
            mostrarBaile(baile);
            mostrarTurnoActual(false);
            document.getElementById("estadoVotacion").style.display = "none";
            document.getElementById("seccionVotacion").style.display = "block";
            document.getElementById("btnIniciarVotacion").disabled = false;
            actualizarBailesRestantes();
            guardarPartidaAuto();
        }

        function mostrarBaile(baile) {
            document.getElementById("numeroBaile").textContent = `BAILE Nº ${baile.id} DE ${BAILES.length}`;
            document.getElementById("nombreBaile").textContent = baile.nombre;
            document.getElementById("selloEstrellas").textContent = "✦".repeat(baile.estrellas) + " nivel " + baile.estrellas;
            document.getElementById("enlaceBaile").href = baile.enlace;
            const puntosSinRed = baile.puntosSinRed || baile.estrellas * 10;
            const puntosConChuleta = baile.puntosConChuleta || baile.estrellas * 5;
            document.getElementById("puntosSinRedTxt").textContent = puntosSinRed + " pts";
            document.getElementById("puntosChuletaTxt").textContent = puntosConChuleta + " pts";
            document.getElementById("resultado").style.display = "block";
            document.getElementById("votacionPanel").style.display = "none";
            document.getElementById("resultadoVotacion").style.display = "none";
            document.getElementById("modalidadSeleccionada").textContent = "";
            document.getElementById("resultadoPuntosGrande").style.display = "none";
            document.getElementById("botonSiguienteBaile").style.display = "none";
            document.getElementById("btnSinRed").className = "btn-modalidad";
            document.getElementById("btnChuleta").className = "btn-modalidad";
            votos = [];
            ultimoVoto = null;
            if (timeoutResultado) {
                clearTimeout(timeoutResultado);
                timeoutResultado = null;
            }
        }

        function elegirModalidad(modalidad) {
            if (partidaFinalizada) return;
            modalidadActual = modalidad;
            document.getElementById("btnSinRed").className = "btn-modalidad" + (modalidad === 'sinred' ? " activo-verde" : "");
            document.getElementById("btnChuleta").className = "btn-modalidad" + (modalidad === 'chuleta' ? " activo-naranja" : "");
            document.getElementById("modalidadSeleccionada").textContent = modalidad === 'sinred' ? "Sin red: puntuación completa si sale bien." : "Con chuleta: mitad de puntos si sale bien.";
        }

        function saltarTurno() {
            if (jugadores.length === 0) return;
            if (votacionActiva) {
                mostrarToast("Hay una votación activa. Finalízala primero.");
                return;
            }
            turnoActual = (turnoActual + 1) % jugadores.length;
            mostrarTurnoActual(true);
            mostrarToast(`⏭️ Turno saltado. Ahora le toca a ${jugadores[turnoActual]}`);
        }

        function iniciarVotacion() {
            if (partidaFinalizada) return;
            if (jugadores.length < 2) {
                mostrarToast("Se necesitan al menos 2 jugadores para votar.");
                return;
            }
            if (votacionActiva) {
                mostrarToast("Ya hay una votación en curso.");
                return;
            }
            if (!modalidadActual) {
                mostrarToast("Elige antes: sin red o con chuleta.");
                return;
            }
            if (!baileActual) {
                mostrarToast("Sortea un baile primero.");
                return;
            }
            const nombre = jugadores[turnoActual];
            jugadorVotado = nombre;
            votacionActiva = true;
            votos = [];
            ultimoVoto = null;
            const indiceActual = jugadores.indexOf(nombre);
            votantesPendientes = [];
            for (let i = 1; i < jugadores.length; i++) {
                votantesPendientes.push(jugadores[(indiceActual + i) % jugadores.length]);
            }
            votantesPendientes.push(nombre);
            indiceVotante = 0;
            actualizarVotante();
        }

        function actualizarVotante() {
            const votanteActual = votantesPendientes[indiceVotante];
            document.getElementById("votacionJugador").textContent = votanteActual;
            document.getElementById("progresoVotacion").textContent = ` (${indiceVotante + 1}/${votantesPendientes.length})`;
            document.getElementById("votacionPanel").style.display = "block";
            document.getElementById("resultadoVotacion").style.display = "none";
            document.getElementById("resultadoPuntosGrande").style.display = "none";
            document.getElementById("botonSiguienteBaile").style.display = "none";
            document.getElementById("estadoVotacion").style.display = "inline-block";
            document.querySelectorAll('.voto-boton').forEach(b => b.classList.remove('seleccionado'));
            ultimoVoto = null;
        }

        function votar(valor) {
            if (!votacionActiva) return;
            const votanteActual = votantesPendientes[indiceVotante];
            document.querySelectorAll('.voto-boton').forEach(b => b.classList.remove('seleccionado'));
            document.querySelector(valor === 'bien' ? '.voto-boton.si' : '.voto-boton.no').classList.add('seleccionado');
            ultimoVoto = { votante: votanteActual, voto: valor };
            votos.push(ultimoVoto);
            indiceVotante++;
            if (indiceVotante < votantesPendientes.length) {
                setTimeout(actualizarVotante, 400);
            } else {
                setTimeout(mostrarResultadosVotacion, 400);
            }
        }

        function deshacerVoto() {
            if (!votacionActiva || votos.length === 0) {
                mostrarToast("No hay voto que deshacer.");
                return;
            }
            votos.pop();
            indiceVotante--;
            actualizarVotante();
            mostrarToast("↩️ Último voto deshecho.");
        }

        function mostrarResultadosVotacion() {
            votacionActiva = false;
            let votosBien = votos.filter(v => v.voto === 'bien').length;
            let votosMal = votos.filter(v => v.voto === 'mal').length;
            let aprobado = votosBien >= votosMal;
            let puntos = 0;
            if (aprobado) {
                puntos = modalidadActual === 'sinred' ? baileActual.puntosSinRed || baileActual.estrellas * 10 : baileActual.puntosConChuleta || baileActual.estrellas * 5;
            }
            document.getElementById("resultadoVotacion").style.display = "block";
            document.getElementById("votosResumen").textContent = "Votos: " + votos.map(v => `${v.votante}: ${v.voto === 'bien' ? '👍' : '👎'}`).join(' ');
            if (jugadorVotado && aprobado) {
                puntuaciones[jugadorVotado] = (puntuaciones[jugadorVotado] || 0) + puntos;
                actualizarClasificacion();
            }
            document.getElementById("estadoVotacion").style.display = "none";
            const puntosDiv = document.getElementById("resultadoPuntosGrande");
            puntosDiv.style.display = "block";
            puntosDiv.className = "resultado-puntos " + (aprobado ? "aprobado" : "reprobado");
            puntosDiv.innerHTML = aprobado ? `<span class="puntos-grande">+${puntos} PTS</span><div class="votos-detalle"><span>👍 ${votosBien}</span><span>👎 ${votosMal}</span></div>` : `<span class="puntos-grande">0 PTS</span><div class="votos-detalle"><span>👍 ${votosBien}</span><span>👎 ${votosMal}</span></div>`;
            const disponibles = BAILES.filter(b => !bailesUsados.includes(b.id));
            const btnSig = document.getElementById("botonSiguienteBaile");
            btnSig.style.display = "block";
            if (disponibles.length > 0) {
                btnSig.textContent = `🎯 Siguiente baile (${disponibles.length} disponibles) ➜`;
                btnSig.disabled = false;
            } else {
                btnSig.textContent = "🎉 ¡No quedan más bailes!";
                btnSig.disabled = true;
            }
            guardarPartidaAuto();
        }

        function siguienteBaile() {
            if (partidaFinalizada || jugadores.length === 0) return;
            const disponibles = BAILES.filter(b => !bailesUsados.includes(b.id));
            if (disponibles.length === 0) {
                mostrarToast("🎉 ¡Ya no quedan más bailes!");
                return;
            }
            document.getElementById("botonSiguienteBaile").style.display = "none";
            document.getElementById("resultadoPuntosGrande").style.display = "none";
            document.getElementById("votacionPanel").style.display = "none";
            document.getElementById("resultadoVotacion").style.display = "none";
            turnoActual = (turnoActual + 1) % jugadores.length;
            mostrarTurnoActual(true);
            sortearBaile();
        }

        function finalizarPartida() {
            if (jugadores.length === 0) {
                mostrarToast("No hay jugadores en la partida.");
                return;
            }
            if (votacionActiva) {
                mostrarToast("Hay una votación activa. Finalízala primero.");
                return;
            }
            if (timeoutResultado) {
                clearTimeout(timeoutResultado);
                timeoutResultado = null;
            }
            partidaFinalizada = true;
            document.getElementById("turnoActual").style.display = "none";
            document.getElementById("resultado").style.display = "none";
            document.getElementById("votacionPanel").style.display = "none";
            document.getElementById("seccionVotacion").style.display = "none";
            document.getElementById("resultadoPuntosGrande").style.display = "none";
            document.getElementById("botonSiguienteBaile").style.display = "none";
            const container = document.getElementById("clasificacionContainer");
            const ordenados = [...jugadores].sort((a, b) => puntuaciones[b] - puntuaciones[a]);
            let html = `<div class="clasificacion-final"><h2>🏆 Clasificación final</h2> <p>${bailesUsados.length} bailes bailados</p>`;
            ordenados.forEach((nombre, index) => {
                const posicion = index + 1;
                const medalla = posicion === 1 ? '🥇' : posicion === 2 ? '🥈' : posicion === 3 ? '🥉' : `#${posicion}`;
                html += `<div class="clasificacion-item"><span class="posicion">${medalla}</span><span class="nombre">${nombre}</span><span class="puntos">${puntuaciones[nombre]} pts</span></div>`;
            });
            html += `<button class="btn-principal" style="margin-top:14px;" onclick="reiniciarPartida()">🔄 Nueva partida</button></div>`;
            container.innerHTML = html;
            guardarPartidaAuto();
        }

        function reiniciarPartida() {
            if (!confirm("¿Reiniciar toda la partida?")) return;
            if (timeoutResultado) {
                clearTimeout(timeoutResultado);
                timeoutResultado = null;
            }
            bailesUsados = [];
            turnoActual = 0;
            jugadores.forEach(nombre => puntuaciones[nombre] = 0);
            baileActual = null;
            modalidadActual = null;
            partidaFinalizada = false;
            document.getElementById("resultado").style.display = "none";
            document.getElementById("votacionPanel").style.display = "none";
            document.getElementById("turnoActual").style.display = "none";
            document.getElementById("estadoVotacion").style.display = "none";
            document.getElementById("seccionVotacion").style.display = "block";
            document.getElementById("resultadoPuntosGrande").style.display = "none";
            document.getElementById("botonSiguienteBaile").style.display = "none";
            document.getElementById("botonSiguienteBaile").classList.remove('btn-desactivado');
            document.getElementById("botonSiguienteBaile").disabled = false;
            document.getElementById('btnSortearBaile').classList.remove('btn-desactivado');
            document.getElementById('btnSortearBaile').disabled = false;
            actualizarClasificacion();
            if (jugadores.length > 0) {
                mostrarTurnoActual(true);
            }
            guardarPartidaAuto();
            mostrarToast("🔄 Partida reiniciada.");
        }

        function guardarPartidaAuto() {
            try {
                localStorage.setItem('baileACiegasPartida', JSON.stringify({
                    jugadores,
                    puntuaciones,
                    turnoActual,
                    bailesUsados,
                    partidaFinalizada
                }));
            } catch (e) { console.log('No se pudo autoguardar:', e); }
        }

        function exportarPartida() {
            const datos = {
                jugadores,
                puntuaciones,
                turnoActual,
                bailesUsados,
                partidaFinalizada,
                fecha: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(datos, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `partida_baile_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            mostrarToast("💾 Partida exportada.");
        }

        function cargarPartida() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const datos = JSON.parse(event.target.result);
                        jugadores = datos.jugadores || [];
                        puntuaciones = datos.puntuaciones || {};
                        turnoActual = datos.turnoActual || 0;
                        bailesUsados = datos.bailesUsados || [];
                        partidaFinalizada = datos.partidaFinalizada || false;
                        jugadores.forEach(n => { if (!puntuaciones[n]) puntuaciones[n] = 0; });
                        actualizarListaJugadores();
                        actualizarClasificacion();
                        document.getElementById("resultado").style.display = "none";
                        if (jugadores.length > 0 && !partidaFinalizada) mostrarTurnoActual(true);
                        guardarPartidaAuto();
                        mostrarToast("📂 Partida cargada.");
                    } catch (e) {
                        mostrarToast("Error al leer el archivo.");
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function cargarPartidaAuto() {
            try {
                const datos = localStorage.getItem('baileACiegasPartida');
                if (!datos) return;
                const parsed = JSON.parse(datos);
                if (parsed.jugadores && parsed.jugadores.length > 0) {
                    jugadores = parsed.jugadores;
                    puntuaciones = parsed.puntuaciones || {};
                    turnoActual = parsed.turnoActual || 0;
                    bailesUsados = parsed.bailesUsados || [];
                    partidaFinalizada = parsed.partidaFinalizada || false;
                    jugadores.forEach(n => { if (!puntuaciones[n]) puntuaciones[n] = 0; });
                    actualizarListaJugadores();
                    actualizarClasificacion();
                    if (jugadores.length > 0 && !partidaFinalizada) mostrarTurnoActual(true);
                }
            } catch (e) { console.log('Error cargando partida:', e); }
        }

        function iniciarApp() {
            if (typeof BAILES === 'undefined') {
                console.error('❌ Error: BAILES no está definido.');
                mostrarToast('⚠️ Error: La lista de bailes no se cargó.');
                document.getElementById("bailesRestantes").textContent = '⚠️ Error: Bailes no cargados';
                return;
            }
            for (let i = BAILES.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [BAILES[i], BAILES[j]] = [BAILES[j], BAILES[i]];
            }
            actualizarBailesRestantes();
            cargarPartidaAuto();
            console.log(`✅ App iniciada. ${BAILES.length} bailes cargados.`);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', iniciarApp);
        } else {
            iniciarApp();
        }
    </script>
</body>
</html>
