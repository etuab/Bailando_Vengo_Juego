        function mezclarArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

            if (jugadores.length === 2) return jugadores[idx];

            };
            Object.keys(mazos).forEach(key => mezclarArray(mazos[key]));
        }

        function recargarMazo(mazoKey) {
            const todas = mazos[mazoKey];
            const enUso = [];
            jugadores.forEach(j => {
                const seccion = mazoKey === 'bailes' ? 'bailes' : mazoKey === 'preguntas' ? 'preguntas' : mazoKey === 'vestimentas' ? 'vestimentas' : 'coplas';
                enUso.push(...j.casillero[seccion].map(c => c.id));
            });
            const disponibles = todas.filter(c => !enUso.includes(c.id));
            mazos[mazoKey] = mezclarArray(disponibles);
        }

            if (!nombre) { mostrarToast("Escribe un nombre."); return; }
            if (jugadores.some(j => j.nombre === nombre)) { mostrarToast("Ya existe."); return; }
            if (jugadores.some(j => j.color === colorSeleccionado)) { mostrarToast("Color en uso."); return; }

            renderizarCasilleros();
            guardarPartidaAuto();
            mostrarToast(`✅ ${nombre} añadido.`);

        function actualizarListaJugadores() {
            const container = document.getElementById("listaJugadores");
            if (jugadores.length === 0) { container.innerHTML = "<span style='color:var(--sand-dim);'>No hay jugadores.</span>"; return; }
            let html = "";
            jugadores.forEach((j, index) => {
                const esTurno = partidaActiva && index === turnoActual;
                const esAsistente = partidaActiva && index === asistenteActual;
                let etiqueta = "";
                if (esTurno) etiqueta = " 🎯";
                if (esAsistente && !esTurno) etiqueta = " 🎭";
                html += `<div class="jugador-item" style="border-color:${j.color};">${index+1}. ${j.nombre}${etiqueta}</div>`;
            });
            container.innerHTML = html;
        }

            inicializarMazos();
            partidaActiva = true;

        function siguienteTurno() {
            if (!partidaActiva) { mostrarToast("⚠️ No hay partida."); return; }

            document.getElementById("zonaDado").style.display = "none";
            turnoActual = (turnoActual + 1) % jugadores.length;
            if (turnoActual === 0) {
                ronda++;
                if (jugadores.length > 2) {
                    const posibles = jugadores.map((_, i) => i).filter(i => i !== 0);

            }
            if (asistenteActual === turnoActual) {
                const posibles = jugadores.map((_, i) => i).filter(i => i !== turnoActual);
                asistenteActual = posibles[Math.floor(Math.random() * posibles.length)];
            }
            renderizarCasilleros();
            actualizarListaJugadores();
            guardarPartidaAuto();
            mostrarToast(`🎯 Turno de ${jugadores[turnoActual].nombre} (Asistente: ${jugadores[asistenteActual].nombre})`);
        }

        // ============================================================
        // 🎲 DADO + OPCIONES
        // ============================================================
        const NOMBRES_PRUEBAS = {
            ver: '👀 Ver vídeo',
            escuchar: '👂 Escuchar',
            mimica: '💆 Mímica',
            pregunta: '❓ Pregunta',
            vestimenta: '👗 Vestimenta',
            copla: '🎶 Copla'
        };

        const TIPOS_PRUEBA = ['ver', 'escuchar', 'mimica', 'pregunta', 'vestimenta', 'copla'];

        function tirarDado() {
            if (!partidaActiva) { mostrarToast("⚠️ No hay partida."); return; }
            const jugador = getJugadorActivo();
            if (!jugador) return;
            if (esperandoEleccion) { mostrarToast("⚠️ Ya tienes opciones, elige."); return; }
            if (pruebaEnCurso) { mostrarToast("⚠️ Termina la prueba actual."); return; }
            if (votacionEnCurso) { mostrarToast("⚠️ Termina la votación."); return; }

            const tirada = Math.floor(Math.random() * 6) + 1;
            let numOpciones = 1;
            if (tirada === 1) numOpciones = 1;
            else if (tirada === 2) numOpciones = 2;
            else if (tirada >= 3 && tirada <= 4) numOpciones = 3;
            else if (tirada >= 5 && tirada <= 6) numOpciones = 3;

            let opciones = [];
            for (let i = 0; i < numOpciones; i++) {
                opciones.push(TIPOS_PRUEBA[Math.floor(Math.random() * TIPOS_PRUEBA.length)]);
            }

            if (tirada >= 5 && tirada <= 6 && opciones.length === 3) {
                while (new Set(opciones).size < 3) {
                    const nueva = TIPOS_PRUEBA[Math.floor(Math.random() * TIPOS_PRUEBA.length)];
                    if (!opciones.includes(nueva)) {
                        const repetida = opciones.find((p, idx) => opciones.indexOf(p) !== idx);
                        opciones[opciones.indexOf(repetida)] = nueva;
                    }
                }
            }

            if (tirada === 2 && opciones.length === 2 && opciones[0] === opciones[1]) {
                const nueva = TIPOS_PRUEBA.find(p => p !== opciones[0]) || 'ver';
                opciones[1] = nueva;
            }

            opcionesGeneradas = opciones;
            esperandoEleccion = true;

            const zona = document.getElementById('zonaDado');
            zona.style.display = 'block';

            let html = `<div class="opciones-dado">
                <div class="titulo">🎲 Tirada: ${tirada} → ${opciones.length} opción${opciones.length > 1 ? 'es' : ''}</div>
                <div style="margin:8px 0; font-size:0.9em; color:var(--sand-dim);">
                    ${jugador.nombre}, elige una prueba:
                </div>
                <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:6px;">`;

            opciones.forEach((op, index) => {
                const nombre = NOMBRES_PRUEBAS[op] || op;
                html += `<button class="opcion-btn" onclick="elegirPrueba('${op}')">${nombre}</button>`;
            });

            html += `</div>
                <button class="btn-texto" onclick="cancelarTirada()" style="margin-top:8px;">Cancelar</button>
            </div>`;

            zona.innerHTML = html;
            guardarPartidaAuto();
        }

        function elegirPrueba(opcion) {
            if (!esperandoEleccion) return;
            esperandoEleccion = false;
            const jugador = getJugadorActivo();
            const nombre = NOMBRES_PRUEBAS[opcion] || opcion;
            mostrarToast(`✅ ${jugador.nombre} elige: ${nombre}`);
            document.getElementById('zonaDado').style.display = 'none';
            abrirPrueba(opcion);
            guardarPartidaAuto();
        }

        function cancelarTirada() {
            if (!esperandoEleccion) return;
            esperandoEleccion = false;
            document.getElementById('zonaDado').style.display = 'none';
            mostrarToast("🔄 Tirada cancelada.");
            guardarPartidaAuto();
        }

        // ============================================================
        // 🎯 PRUEBAS (Fase 3)
        // ============================================================
        let tiempoSeleccionado = 15;

        function abrirPrueba(tipo) {
            const jugador = getJugadorActivo();
            const asistente = getAsistente();
            if (!jugador) return;

            let mazoKey = '';
            let seccion = '';
            let carta = null;
            let titulo = '';

            switch (tipo) {
                case 'ver': case 'escuchar': case 'mimica':
                    mazoKey = 'bailes'; seccion = 'bailes'; titulo = '🎵 Adivina el baile';
                    break;
                case 'pregunta':
                    mazoKey = 'preguntas'; seccion = 'preguntas'; titulo = '❓ Responde la pregunta';
                    break;
                case 'vestimenta':
                    mazoKey = 'vestimentas'; seccion = 'vestimentas'; titulo = '👗 ¿De qué isla es?';
                    break;
                case 'copla':
                    mazoKey = 'coplas'; seccion = 'coplas'; titulo = '🎶 Completa la copla';
                    break;
            }

            if (mazos[mazoKey] && mazos[mazoKey].length > 0) {
                carta = mazos[mazoKey].pop();
            } else {
                recargarMazo(mazoKey);
                if (mazos[mazoKey].length === 0) {
                    mostrarToast("⚠️ No hay cartas disponibles.");
                    return;
                }
                carta = mazos[mazoKey].pop();
            }

            pruebaEnCurso = { tipo, carta, mazoKey, seccion, jugador, asistente, respondida: false };

            const modal = document.getElementById('modalPrueba');
            modal.classList.add('visible');
            document.getElementById('tituloPrueba').textContent = titulo;

            const container = document.getElementById('contenidoPrueba');
            let html = `<div class="prueba-container">`;
            
            html += `<div style="font-size:0.8em; color:var(--sand-dim); margin-bottom:4px;">⏱️ Tiempo:</div>
                <div class="tiempo-selector">
                    <button onclick="setTiempoPrueba(10)" class="${tiempoSeleccionado===10?'activo':''}">10s</button>
                    <button onclick="setTiempoPrueba(20)" class="${tiempoSeleccionado===20?'activo':''}">20s</button>
                    <button onclick="setTiempoPrueba(30)" class="${tiempoSeleccionado===30?'activo':''}">30s</button>
                    <button onclick="setTiempoPrueba(45)" class="${tiempoSeleccionado===45?'activo':''}">45s</button>
                    <button onclick="setTiempoPrueba(60)" class="${tiempoSeleccionado===60?'activo':''}">60s</button>
                </div>`;

            const nombreCarta = carta.nombre || carta.titulo || `ID ${carta.id}`;
            
            if (tipo === 'ver' || tipo === 'escuchar') {
                html += `<p style="color:var(--sand-dim); margin:8px 0;">${tipo === 'ver' ? '👀 Mira el vídeo sin sonido' : '👂 Escucha el audio sin ver'}</p>
                    <a href="${carta.enlace}" target="_blank" class="enlace-prueba">🎬 Abrir vídeo (${tipo === 'ver' ? 'sin sonido' : 'solo audio'})</a>
                    <p style="color:var(--sand-dim); font-size:0.85em;">¿Cuál es el baile?</p>
                    <input type="text" id="respuestaPrueba" class="respuesta-input" placeholder="Escribe el nombre del baile...">
                    <button class="btn-principal" onclick="responderPrueba()" style="margin-top:8px;">✅ Responder</button>`;
            } else if (tipo === 'mimica') {
                html += `<p style="color:var(--sand-dim); margin:8px 0;">💆 El jugador ve el vídeo y hace mímica. El asistente adivina.</p>
                    <a href="${carta.enlace}" target="_blank" class="enlace-prueba">🎬 Ver vídeo (solo el jugador)</a>
                    <p style="color:var(--sand-dim); font-size:0.85em;">El asistente, ¿qué baile es?</p>
                    <input type="text" id="respuestaPrueba" class="respuesta-input" placeholder="Escribe el nombre del baile...">
                    <button class="btn-principal" onclick="responderPrueba()" style="margin-top:8px;">✅ Responder</button>`;
            } else if (tipo === 'pregunta') {
                const opciones = carta.opciones.map((op, i) => `${String.fromCharCode(65+i)}) ${op}`).join(' · ');
                html += `<p style="color:var(--sand); font-weight:600;">${carta.pregunta}</p>
                    <p style="color:var(--sand-dim); font-size:0.85em; margin:8px 0;">${opciones}</p>
                    <input type="text" id="respuestaPrueba" class="respuesta-input" placeholder="Escribe la letra (A, B, C...)">
                    <button class="btn-principal" onclick="responderPrueba()" style="margin-top:8px;">✅ Responder</button>`;
            } else if (tipo === 'vestimenta') {
                html += `<a href="${carta.enlace}" target="_blank" class="enlace-prueba">👗 Ver vestimenta</a>
                    <p style="color:var(--sand-dim); font-size:0.85em;">¿De qué isla es?</p>
                    <input type="text" id="respuestaPrueba" class="respuesta-input" placeholder="Escribe el nombre de la isla...">
                    <button class="btn-principal" onclick="responderPrueba()" style="margin-top:8px;">✅ Responder</button>`;
            } else if (tipo === 'copla') {
                const textoConHuecos = carta.texto.replace(/\.{5,}/g, '_____');
                html += `<p style="color:var(--sand); font-weight:600;">${textoConHuecos}</p>
                    <p style="color:var(--sand-dim); font-size:0.85em;">Completa las palabras que faltan (${carta.palabras.length} palabras)</p>
                    <p style="color:var(--sand-dim); font-size:0.8em;">🔗 <a href="${carta.enlace}" target="_blank" style="color:var(--ocean-light);">Ver copla completa (solo asistente)</a></p>
                    <input type="text" id="respuestaPrueba" class="respuesta-input" placeholder="Escribe las palabras separadas por comas...">
                    <button class="btn-principal" onclick="responderPrueba()" style="margin-top:8px;">✅ Responder</button>`;
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        function setTiempoPrueba(segundos) {
            tiempoSeleccionado = segundos;
            document.querySelectorAll('.tiempo-selector button').forEach(b => b.classList.remove('activo'));
            document.querySelector(`.tiempo-selector button[onclick="setTiempoPrueba(${segundos})"]`).classList.add('activo');
        }

        function responderPrueba() {
            if (!pruebaEnCurso || pruebaEnCurso.respondida) return;
            pruebaEnCurso.respondida = true;

            const input = document.getElementById('respuestaPrueba');
            const respuesta = input ? input.value.trim() : '';
            const { tipo, carta, mazoKey, seccion, jugador, asistente } = pruebaEnCurso;

            let exito = false;
            if (tipo === 'ver' || tipo === 'escuchar' || tipo === 'mimica') {
                exito = respuesta.toLowerCase().includes(carta.nombre.toLowerCase()) || 
                        carta.nombre.toLowerCase().includes(respuesta.toLowerCase());
            } else if (tipo === 'pregunta') {
                const correcta = carta.opciones[carta.correcta];
                exito = respuesta.toLowerCase() === correcta.toLowerCase() ||
                        respuesta.toUpperCase() === String.fromCharCode(65 + carta.correcta);
            } else if (tipo === 'vestimenta') {
                exito = respuesta.toLowerCase() === carta.isla.toLowerCase();
            } else if (tipo === 'copla') {
                const palabrasOk = carta.palabras.every(p => respuesta.toLowerCase().includes(p.toLowerCase()));
                exito = palabrasOk;
            }

            document.getElementById('modalPrueba').classList.remove('visible');

            if (exito) {
                const casillero = jugador.casillero;
                const maximo = seccion === 'bailes' ? 5 : 3;
                if (casillero[seccion].length < maximo) {
                    casillero[seccion].push(carta);
                    mostrarToast(`✅ ${jugador.nombre} ha ganado: ${carta.nombre || carta.titulo || `ID ${carta.id}`}`);
                } else {
                    const descartada = casillero[seccion].shift();
                    casillero[seccion].push(carta);
                    mostrarToast(`🔄 Sección llena. Descartado: ${descartada.nombre || descartada.titulo || `ID ${descartada.id}`}`);
                }
                if (asistente && asistente.casillero.comodines.length < 5) {
                    asistente.casillero.comodines.push({});
                    mostrarToast(`⭐ ${asistente.nombre} gana un comodín.`);
                }
            } else {
                mostrarToast(`❌ ${jugador.nombre} ha fallado.`);
                mazos[mazoKey].push(carta);
            }

            historial.push({
                ronda: ronda + 1,
                jugador: jugador.nombre,
                tipo: tipo,
                exito: exito,
                carta: carta ? carta.id : null
            });

            pruebaEnCurso = null;
            renderizarCasilleros();
            guardarPartidaAuto();

            if (comprobarRequisitosTaifas(jugador)) {
                mostrarToast(`🏆 ¡${jugador.nombre} puede realizar un Baile de Taifas!`);
                renderizarCasilleros();
            }
        }

        function cancelarPrueba() {
            if (!pruebaEnCurso) return;
            const { carta, mazoKey } = pruebaEnCurso;
            mazos[mazoKey].push(carta);
            pruebaEnCurso = null;
            document.getElementById('modalPrueba').classList.remove('visible');
            mostrarToast("🔄 Prueba cancelada.");
            renderizarCasilleros();
            guardarPartidaAuto();
        }

        // ============================================================
        // 🏆 REQUISITOS PARA BAILE DE TAIFAS
        // ============================================================
        function comprobarRequisitosTaifas(jugador) {
            const c = jugador.casillero;
            if (c.bailes.length < 5) return false;
            if (c.preguntas.length < 1) return false;
            if (c.vestimentas.length < 1) return false;
            if (c.coplas.length < 1) return false;
            if (c.comodines.length < 1) return false;
            const lugaresPendientes = LUGARES_TAIFAS.filter(l => !c.taifasLogrados.includes(l));
            return lugaresPendientes.length > 0;
        }

        // ============================================================
        // ⭐ COMODINES (Fase 5)
        // ============================================================
        function abrirModalComodin() {
            const jugador = getJugadorActivo();
            if (!jugador) return;
            if (jugador.casillero.comodines.length === 0) {
                mostrarToast("No tienes comodines.");
                return;
            }

            const modal = document.getElementById("modalComodin");
            modal.classList.add("visible");
            const container = document.getElementById("opcionesComodin");
            container.innerHTML = `
                <div class="opcion" onclick="usarComodin('doble_tiempo')">
                    <div class="titulo">⏱️ Doblar tiempo (1 comodín)</div>
                    <div class="descripcion">Duplica el tiempo de la próxima prueba.</div>
                </div>
                <div class="opcion" onclick="usarComodin('repetir')">
                    <div class="titulo">🔄 Segunda oportunidad (2 comodines)</div>
                    <div class="descripcion">Si fallas, vuelve a tirar el dado.</div>
                </div>
                <div class="opcion" onclick="usarComodin('comprar')">
                    <div class="titulo">🃏 Comprar carta (2 comodines)</div>
                    <div class="descripcion">Obtén una carta de pregunta, vestimenta o copla.</div>
                </div>
                <div class="opcion" onclick="usarComodin('cambiar_asistente')">
                    <div class="titulo">🔄 Cambiar asistente (2 comodines)</div>
                    <div class="descripcion">Elige a otro jugador como tu asistente.</div>
                </div>
            `;
        }

        function cerrarModalComodin() {
            document.getElementById("modalComodin").classList.remove("visible");
        }

        function usarComodin(tipo) {
            const jugador = getJugadorActivo();
            if (!jugador) return;

            let costo = 0;
            switch (tipo) {
                case 'doble_tiempo': costo = 1; break;
                case 'repetir': costo = 2; break;
                case 'comprar': costo = 2; break;
                case 'cambiar_asistente': costo = 2; break;
                default: return;
            }

            if (jugador.casillero.comodines.length < costo) {
                mostrarToast(`Necesitas ${costo} comodines.`);
                return;
            }

            for (let i = 0; i < costo; i++) {
                jugador.casillero.comodines.pop();
            }

            let mensaje = '';
            switch (tipo) {
                case 'doble_tiempo':
                    jugador.tiempoDoble = true;
                    mensaje = '⏱️ Próxima prueba con tiempo doble.';
                    break;
                case 'repetir':
                    mensaje = '🔄 Segunda oportunidad activada. Vuelve a tirar el dado.';
                    setTimeout(tirarDado, 500);
                    break;
                case 'comprar':
                    const tipos = ['preguntas', 'vestimentas', 'coplas'];
                    const tipoCompra = tipos[Math.floor(Math.random() * tipos.length)];
                    if (mazos[tipoCompra].length > 0) {
                        const carta = mazos[tipoCompra].pop();
                        const seccion = tipoCompra === 'preguntas' ? 'preguntas' : tipoCompra === 'vestimentas' ? 'vestimentas' : 'coplas';
                        const casillero = jugador.casillero;
                        if (casillero[seccion].length < 3) {
                            casillero[seccion].push(carta);
                            mensaje = `🃏 Has comprado una carta de ${tipoCompra.slice(0,-1)}.`;
                        } else {
                            mensaje = `No tienes espacio para más ${tipoCompra}.`;
                            mazos[tipoCompra].push(carta);
                        }
                    } else {
                        mensaje = 'No hay cartas disponibles para comprar.';
                    }
                    break;
                case 'cambiar_asistente':
                    const otros = jugadores.filter(j => j.nombre !== jugador.nombre);
                    if (otros.length > 0) {
                        const elegido = otros[Math.floor(Math.random() * otros.length)];
                        const idx = jugadores.indexOf(elegido);
                        asistenteActual = idx;
                        mensaje = `🔄 Ahora tu asistente es ${elegido.nombre}.`;
                    } else {
                        mensaje = 'No hay otros jugadores.';
                    }
                    break;
            }

            mostrarToast(mensaje);
            cerrarModalComodin();
            renderizarCasilleros();
            guardarPartidaAuto();
        }

        // ============================================================
        // 🏆 BAILE DE TAIFAS (Fase 6)
        // ============================================================
        function abrirModalTaifas() {
            const jugador = getJugadorActivo();
            if (!jugador) return;
            if (!comprobarRequisitosTaifas(jugador)) {
                mostrarToast("⚠️ No cumples los requisitos.");
                return;
            }

            const modal = document.getElementById("modalTaifas");
            modal.classList.add("visible");
            const container = document.getElementById("contenidoTaifas");

            const lugaresPendientes = LUGARES_TAIFAS.filter(l => !jugador.casillero.taifasLogrados.includes(l));

            let html = `
                <p style="color:var(--sand-dim); margin-bottom:8px;">📍 Elige el lugar:</p>
                <div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; justify-content:center;">
                    ${lugaresPendientes.map(l => `<button class="btn-secundario" onclick="seleccionarLugarTaifas('${l}')" style="margin:2px;">${l}</button>`).join('')}
                </div>
                <p style="color:var(--sand-dim); margin-bottom:8px;">🕺 Elige 3 bailes (en el orden que los realizarás):</p>
                <div id="bailesTaifasSeleccion" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; justify-content:center;">
                    ${jugador.casillero.bailes.map((b, i) => `<button class="btn-secundario" onclick="toggleBaileTaifas(${i})" id="btnBaileTaifas_${i}" style="margin:2px;">${b.id} ${b.nombre}</button>`).join('')}
                </div>
                <div style="font-size:0.8em; color:var(--sand-dim); text-align:center;">Seleccionados: <span id="contadorBailesTaifas">0</span>/3</div>
                <button class="btn-principal" onclick="confirmarTaifas()" id="btnConfirmarTaifas" style="margin-top:12px; display:none;">✅ Confirmar Baile de Taifas</button>
            `;

            container.innerHTML = html;
            window.taifasState = {
                lugar: null,
                bailesSeleccionados: [],
                jugador: jugador
            };
        }

        function seleccionarLugarTaifas(lugar) {
            window.taifasState.lugar = lugar;
            mostrarToast(`📍 Lugar seleccionado: ${lugar}`);
            actualizarBotonConfirmarTaifas();
        }

        function toggleBaileTaifas(index) {
            const state = window.taifasState;
            const idx = state.bailesSeleccionados.indexOf(index);
            if (idx !== -1) {
                state.bailesSeleccionados.splice(idx, 1);
            } else {
                if (state.bailesSeleccionados.length >= 3) {
                    mostrarToast("Ya has seleccionado 3 bailes.");
                    return;
                }
                state.bailesSeleccionados.push(index);
            }
            document.querySelectorAll('#bailesTaifasSeleccion .btn-secundario').forEach((btn, i) => {
                if (state.bailesSeleccionados.includes(i)) {
                    btn.style.borderColor = 'var(--ochre)';
                    btn.style.background = 'rgba(212,160,23,0.2)';
                } else {
                    btn.style.borderColor = 'var(--line)';
                    btn.style.background = 'var(--basalt-1)';
                }
            });
            document.getElementById('contadorBailesTaifas').textContent = state.bailesSeleccionados.length;
            actualizarBotonConfirmarTaifas();
        }

        function actualizarBotonConfirmarTaifas() {
            const state = window.taifasState;
            const btn = document.getElementById('btnConfirmarTaifas');
            if (state.lugar && state.bailesSeleccionados.length === 3) {
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }
        }

        function confirmarTaifas() {
            const state = window.taifasState;
            if (!state.lugar || state.bailesSeleccionados.length !== 3) {
                mostrarToast("Selecciona lugar y 3 bailes.");
                return;
            }

            const jugador = state.jugador;
            const bailesElegidos = state.bailesSeleccionados.map(i => jugador.casillero.bailes[i]);

            cerrarModalTaifas();
            iniciarVotacionTaifas(jugador, state.lugar, bailesElegidos);
        }

        function cerrarModalTaifas() {
            document.getElementById("modalTaifas").classList.remove("visible");
        }

        // ============================================================
        // 🗳️ VOTACIÓN (Fase 6)
        // ============================================================
        function iniciarVotacionTaifas(jugador, lugar, bailesElegidos) {
            const votantes = jugadores.filter(j => j.nombre !== jugador.nombre);
            if (votantes.length === 0) {
                finalizarVotacionTaifas(jugador, lugar, bailesElegidos, true);
                return;
            }

            votacionEnCurso = {
                tipo: 'taifas',
                jugador: jugador,
                lugar: lugar,
                bailesElegidos: bailesElegidos,
                votantes: votantes,
                votos: [],
                indiceVotante: 0
            };

            mostrarVotanteTaifas();
        }

        function mostrarVotanteTaifas() {
            const v = votacionEnCurso;
            if (v.indiceVotante >= v.votantes.length) {
                const aprobados = v.votos.filter(voto => voto).length;
                const exito = aprobados > v.votantes.length / 2;
                finalizarVotacionTaifas(v.jugador, v.lugar, v.bailesElegidos, exito);
                return;
            }

            const votante = v.votantes[v.indiceVotante];
            const modal = document.getElementById('modalVotacion');
            modal.classList.add('visible');
            document.getElementById('tituloVotacion').textContent = `🗳️ Votación - ${v.lugar}`;

            const container = document.getElementById('contenidoVotacion');
            container.innerHTML = `
                <div style="text-align:center; padding:10px 0;">
                    <p style="color:var(--sand); font-size:1.1em;">${votante.nombre}, ¿cree que ${v.jugador.nombre} ha bailado bien?</p>
                    <p style="color:var(--sand-dim); font-size:0.85em; margin:8px 0;">Bailes: ${v.bailesElegidos.map(b => b.nombre).join(' · ')}</p>
                    <div class="votacion-botones">
                        <button class="si" onclick="votarTaifas(true)">👍 Sí</button>
                        <button class="no" onclick="votarTaifas(false)">👎 No</button>
                    </div>
                    <p style="color:var(--sand-dim); font-size:0.75em;">Votante ${v.indiceVotante+1}/${v.votantes.length}</p>
                </div>
            `;
        }

        function votarTaifas(aprobado) {
            const v = votacionEnCurso;
            v.votos.push(aprobado);
            v.indiceVotante++;
            document.getElementById('modalVotacion').classList.remove('visible');
            setTimeout(mostrarVotanteTaifas, 400);
        }

        function finalizarVotacionTaifas(jugador, lugar, bailesElegidos, exito) {
            votacionEnCurso = null;
            document.getElementById('modalVotacion').classList.remove('visible');

            if (exito) {
                jugador.casillero.taifasLogrados.push(lugar);
                const idsAEliminar = bailesElegidos.map(b => b.id);
                jugador.casillero.bailes = jugador.casillero.bailes.filter(b => !idsAEliminar.includes(b.id));
                if (jugador.casillero.preguntas.length > 0) jugador.casillero.preguntas.shift();
                if (jugador.casillero.vestimentas.length > 0) jugador.casillero.vestimentas.shift();
                if (jugador.casillero.coplas.length > 0) jugador.casillero.coplas.shift();
                if (jugador.casillero.comodines.length > 0) jugador.casillero.comodines.shift();

                mostrarToast(`🏆 ¡${jugador.nombre} ha conseguido ${lugar}!`);
                historial.push({
                    ronda: ronda + 1,
                    jugador: jugador.nombre,
                    tipo: 'taifas',
                    exito: true,
                    lugar: lugar
                });
            } else {
                bailesElegidos.forEach(b => mazos.bailes.push(b));
                mostrarToast(`❌ ${jugador.nombre} no ha conseguido ${lugar}.`);
                historial.push({
                    ronda: ronda + 1,
                    jugador: jugador.nombre,
                    tipo: 'taifas',
                    exito: false,
                    lugar: lugar
                });
            }

            renderizarCasilleros();
            guardarPartidaAuto();

            if (jugador.casillero.taifasLogrados.length === LUGARES_TAIFAS.length) {
                mostrarToast(`🏆 ¡${jugador.nombre} ha ganado la partida!`);
                finalizarPartida();
            }
        }

        // ============================================================
        // 🖼️ RENDERIZAR CASILLEROS
        // ============================================================
        function renderizarCasilleros() {
            const container = document.getElementById('casillerosContainer');
            if (jugadores.length === 0) {
                container.innerHTML = '<span style="color:var(--sand-dim);font-size:0.85em;">Añade jugadores.</span>';
                return;
            }

            const ordenVisual = [];
            if (partidaActiva && turnoActual !== undefined) ordenVisual.push(turnoActual);
            if (partidaActiva && asistenteActual !== undefined && asistenteActual !== turnoActual) ordenVisual.push(asistenteActual);
            jugadores.forEach((_, i) => { if (!ordenVisual.includes(i)) ordenVisual.push(i); });

            let html = '';
            ordenVisual.forEach(idx => {
                const j = jugadores[idx];
                const esTurno = partidaActiva && idx === turnoActual;
                const esAsistente = partidaActiva && idx === asistenteActual;
                const c = j.casillero;
                let clases = 'casillero-jugador';
                if (esTurno) clases += ' turno';
                if (esAsistente) clases += ' asistente';
                let etiqueta = '';
                if (esTurno) etiqueta = '🎯 Turno';
                else if (esAsistente) etiqueta = '🎭 Asistente';

                const puedeTaifas = esTurno && comprobarRequisitosTaifas(j);

                html += `
                    <div class="${clases}">
                        <div class="nombre" style="color:${j.color};">
                            ${j.nombre}
                            ${etiqueta ? `<span class="etiqueta ${esAsistente ? 'asistente' : ''}">${etiqueta}</span>` : ''}
                        </div>
                        <div class="seccion">
                            <div class="seccion-titulo">🕺 Bailes <span class="contador">${c.bailes.length}/5</span></div>
                            <div class="tarjetas">${c.bailes.length > 0 ? c.bailes.map(b => `<span class="tarjeta">${b.id} ${b.nombre}</span>`).join('') : '<span class="vacio">Vacío</span>'}</div>
                        </div>
                        <div class="seccion">
                            <div class="seccion-titulo">❓ Preguntas <span class="contador">${c.preguntas.length}/3</span></div>
                            <div class="tarjetas">${c.preguntas.length > 0 ? c.preguntas.map(p => `<span class="tarjeta">${p.id}</span>`).join('') : '<span class="vacio">Vacío</span>'}</div>
                        </div>
                        <div class="seccion">
                            <div class="seccion-titulo">👗 Vestimentas <span class="contador">${c.vestimentas.length}/3</span></div>
                            <div class="tarjetas">${c.vestimentas.length > 0 ? c.vestimentas.map(v => `<span class="tarjeta">${v.id}</span>`).join('') : '<span class="vacio">Vacío</span>'}</div>
                        </div>
                        <div class="seccion">
                            <div class="seccion-titulo">🎶 Coplas <span class="contador">${c.coplas.length}/3</span></div>
                            <div class="tarjetas">${c.coplas.length > 0 ? c.coplas.map(co => `<span class="tarjeta">${co.id}</span>`).join('') : '<span class="vacio">Vacío</span>'}</div>
                        </div>
                        <div class="seccion">
                            <div class="seccion-titulo">⭐ Comodines <span class="contador">${c.comodines.length}/5</span></div>
                            <div class="tarjetas">${c.comodines.length > 0 ? c.comodines.map((_, i) => `<span class="tarjeta comodin">#${i+1}</span>`).join('') : '<span class="vacio">Vacío</span>'}</div>
                            ${esTurno && c.comodines.length > 0 ? `<button class="btn-accion-jugador" onclick="abrirModalComodin()">⭐ Canjear</button>` : ''}
                        </div>
                        <div class="seccion">
                            <div class="seccion-titulo">🏆 Taifas <span class="contador">${c.taifasLogrados.length}/${LUGARES_TAIFAS.length}</span></div>
                            <div class="tarjetas">${c.taifasLogrados.length > 0 ? c.taifasLogrados.map(l => `<span class="tarjeta taifa">✅ ${l}</span>`).join('') : '<span class="vacio">Ninguno</span>'}</div>
                        </div>
                        ${esTurno && !pruebaEnCurso && !votacionEnCurso ? `<button class="btn-accion-jugador" onclick="tirarDado()">🎲 Sortear prueba</button>` : ''}
                        ${puedeTaifas ? `<button class="btn-accion-jugador taifas" onclick="abrirModalTaifas()">🏆 ¡Baile de Taifas!</button>` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ============================================================
        // 🏁 FINAL DE PARTIDA (Fase 7)
        // ============================================================
        function terminarPartida() {
            if (!partidaActiva) {
                mostrarToast("⚠️ No hay partida activa.");
                return;
            }
            if (!confirm("¿Terminar la partida?")) return;
            finalizarPartida();
        }

        function finalizarPartida() {
            partidaActiva = false;
            document.getElementById("btnSiguienteTurno").style.display = "none";
            document.getElementById("btnTerminarPartida").style.display = "none";
            document.getElementById("btnIniciarPartida").textContent = "🎵 Nueva partida";

            const ordenados = [...jugadores].sort((a, b) => b.casillero.taifasLogrados.length - a.casillero.taifasLogrados.length);

            const container = document.getElementById('casillerosContainer');
            let html = `<div class="panel" style="background:var(--basalt-2); border-color:var(--ochre);">
                <div style="text-align:center; color:var(--ochre-light); font-weight:700; font-size:1.1em; margin-bottom:8px;">🏆 Clasificación Final</div>
                <div style="font-size:0.85em; color:var(--sand-dim); text-align:center; margin-bottom:8px;">${historial.length} pruebas realizadas</div>`;
            ordenados.forEach((j, i) => {
                const medalla = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
                html += `
                    <div style="display:flex; justify-content:space-between; padding:4px 8px; border-bottom:1px solid var(--line);">
                        <span style="color:${j.color};">${medalla} ${j.nombre}</span>
                        <span style="color:var(--ochre-light);">${j.casillero.taifasLogrados.length} Taifas</span>
                    </div>
                `;
            });
            html += `<button class="btn-principal" style="margin-top:12px;" onclick="reiniciarPartida()">🔄 Nueva partida</button>`;
            html += `</div>`;
            container.innerHTML = html;

            guardarPartidaAuto();
        }

        function reiniciarPartida() {
            if (!confirm("¿Reiniciar partida?")) return;
            jugadores.forEach(j => {
                j.casillero = { bailes: [], preguntas: [], vestimentas: [], coplas: [], comodines: [], taifasLogrados: [] };
            });
            partidaActiva = false;
            turnoActual = 0;
            ronda = 0;
            historial = [];
            pruebaEnCurso = null;
            votacionEnCurso = null;
            document.getElementById("zonaDado").style.display = "none";
            renderizarCasilleros();
            actualizarListaJugadores();
            document.getElementById("btnIniciarPartida").textContent = "🎵 Iniciar BAILANDO VENGO";
            document.getElementById("btnSiguienteTurno").style.display = "none";
            document.getElementById("btnTerminarPartida").style.display = "none";
            guardarPartidaAuto();
            mostrarToast("🔄 Partida reiniciada.");
        }

        // ============================================================
        // 💾 PERSISTENCIA
        // ============================================================
        function guardarPartidaAuto() {
            try {
                const datos = {
                    jugadores,
                    partidaActiva,
                    turnoActual,
                    asistenteActual,
                    ronda,
                    mazos,
                    historial,
                    version: "Final"
                };
                localStorage.setItem('granJuegoFinal', JSON.stringify(datos));
            } catch (e) { console.log('Error guardando:', e); }
        }

        function cargarPartidaAuto() {
            try {
                const datos = localStorage.getItem('granJuegoFinal');
                if (!datos) return;
                const parsed = JSON.parse(datos);
                if (!parsed.jugadores || parsed.jugadores.length === 0) return;
                jugadores = parsed.jugadores;
                partidaActiva = parsed.partidaActiva || false;
                turnoActual = parsed.turnoActual || 0;
                asistenteActual = parsed.asistenteActual || (jugadores.length > 1 ? 1 : 0);
                ronda = parsed.ronda || 0;
                mazos = parsed.mazos || {};
                historial = parsed.historial || [];

                actualizarListaJugadores();
                renderizarCasilleros();

                if (partidaActiva) {
                    document.getElementById("btnIniciarPartida").textContent = "🎵 Partida en curso";
                    document.getElementById("btnSiguienteTurno").style.display = "inline-block";
                    document.getElementById("btnTerminarPartida").style.display = "inline-block";
                }
                console.log('✅ Partida final cargada.');
            } catch (e) { console.log('Error cargando:', e); }
        }

        // ============================================================
        // 🚀 INICIO
        // ============================================================
        function iniciarApp() {
            renderizarSelectorColor();
            cargarPartidaAuto();
            if (jugadores.length > 0 && !partidaActiva) renderizarCasilleros();
            console.log('✅ BAILANDO VENGO - Versión Final iniciada.');
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', iniciarApp);
        else iniciarApp();
    </script>
</body>
</html>
