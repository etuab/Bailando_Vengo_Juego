
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAILANDO VENGO · El Gran Juego</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Work+Sans:wght@400;500;600;700&display=swap');
        :root {
            --basalt-0: #161210;
            --basalt-1: #211a16;
            --basalt-2: #2c2420;
            --sand: #f4ead4;
            --sand-dim: #c9bba0;
            --terracota: #c1502e;
            --terracota-dark: #8f3a21;
            --terracota-light: #e07a52;
            --ocean: #1f6f78;
            --ocean-light: #4fa3ab;
            --ochre: #d4a017;
            --ochre-light: #eac35c;
            --line: rgba(244,234,212,0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Work Sans', sans-serif;
            background: radial-gradient(circle at 15% 0%, rgba(193,80,46,0.18), transparent 45%), radial-gradient(circle at 100% 20%, rgba(31,111,120,0.16), transparent 50%), var(--basalt-0);
            color: var(--sand);
            min-height: 100vh;
            padding: 14px;
            max-width: 520px;
            margin: 0 auto;
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }
        h1 {
            font-family: 'Fraunces', serif;
            font-weight: 800;
            font-size: 1.7em;
            text-align: center;
            letter-spacing: 0.5px;
            color: var(--sand);
            margin: 6px 0 2px;
        }
        h1 .isla {
            display: block;
            font-family: 'Work Sans', sans-serif;
            font-weight: 600;
            font-size: 0.32em;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--ochre-light);
            margin-top: 4px;
        }
        .subtitulo {
            text-align: center;
            color: var(--sand-dim);
            font-size: 0.85em;
            margin-bottom: 16px;
        }
        .panel {
            margin-top: 14px;
            padding: 16px;
            background: var(--basalt-1);
            border: 1px solid var(--line);
            border-radius: 14px;
        }
        .panel-titulo {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 1.05em;
            color: var(--ochre-light);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line);
        }
        button {
            font-family: 'Work Sans', sans-serif;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            touch-action: manipulation;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }
        button:active { transform: scale(0.97); }
        .btn-principal {
            display: block;
            width: 100%;
            background: var(--terracota);
            color: var(--sand);
            font-weight: 700;
            font-size: 1.15em;
            padding: 16px;
            border-radius: 14px;
            box-shadow: 0 6px 0 var(--terracota-dark);
        }
        .btn-principal:active { box-shadow: 0 3px 0 var(--terracota-dark); transform: translateY(3px) scale(1); }
        .btn-principal:disabled { opacity: 0.35; box-shadow: none; cursor: not-allowed; }
        .btn-principal.secundario { background: var(--ocean); box-shadow: 0 6px 0 var(--ocean); }
        .btn-secundario {
            background: transparent;
            color: var(--sand);
            border: 1.5px solid var(--line);
            font-size: 0.85em;
            font-weight: 600;
            padding: 9px 14px;
        }
        .btn-secundario:hover { border-color: var(--ocean-light); }
        .btn-texto {
            background: none;
            color: var(--sand-dim);
            font-size: 0.8em;
            text-decoration: underline;
            padding: 6px 4px;
        }
        .btn-modalidad-juego {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
            background: var(--basalt-1);
            color: var(--sand);
            border: 2px solid var(--line);
        }
        .btn-modalidad-juego.activo {
            background: var(--terracota);
            border-color: var(--ochre);
        }
        .btn-modalidad-juego small {
            display: block;
            font-weight: 400;
            font-size: 0.7em;
            opacity: 0.8;
        }
        .fila-botones {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            justify-content: center;
        }
        .acciones-menores {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .input-nombre {
            padding: 12px;
            font-size: 16px;
            border-radius: 9px;
            border: 1.5px solid var(--line);
            background: var(--basalt-2);
            color: var(--sand);
            width: 100%;
            margin-bottom: 8px;
        }
        .input-nombre:focus { outline: none; border-color: var(--ocean-light); }
        .jugador-item {
            padding: 6px 12px;
            background: var(--basalt-2);
            margin: 3px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.9em;
            border: 1px solid var(--line);
        }
        .jugador-item.turno {
            border-color: var(--ochre);
            color: var(--ochre-light);
            font-weight: 600;
        }
        .clasificacion-container { max-height: 280px; overflow-y: auto; }
        .clasificacion-item {
            padding: 9px 12px;
            background: var(--basalt-2);
            margin: 5px 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 3px solid var(--ochre);
        }
        .clasificacion-item .posicion {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            color: var(--ochre-light);
            min-width: 26px;
        }
        .clasificacion-item .nombre { flex: 1; font-weight: 600; }
        .clasificacion-item .puntos { color: var(--terracota-light); font-weight: 700; }
        .estado-juego {
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            margin: 8px 0;
            font-weight: 600;
        }
        .estado-juego.turno {
            background: rgba(212, 160, 23, 0.12);
            border: 1px solid var(--ochre);
            color: var(--ochre-light);
        }
        .estado-juego.prueba {
            background: rgba(31, 111, 120, 0.15);
            border: 1px solid var(--ocean);
            color: var(--ocean-light);
        }
        .estado-juego.final {
            background: rgba(193, 80, 46, 0.12);
            border: 1px solid var(--terracota);
            color: var(--terracota-light);
        }
        .billete {
            display: none;
            margin-top: 16px;
            position: relative;
            background: var(--basalt-2);
            border-radius: 16px;
            padding: 20px 18px 18px;
            border: 1px solid var(--line);
        }
        .billete::before, .billete::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 22px;
            height: 22px;
            background: var(--basalt-0);
            border-radius: 50%;
            transform: translateY(-50%);
        }
        .billete::before { left: -11px; }
        .billete::after { right: -11px; }
        .billete .num {
            font-family: 'Fraunces', serif;
            font-size: 0.75em;
            color: var(--sand-dim);
            letter-spacing: 1px;
        }
        .billete h2 {
            font-family: 'Fraunces', serif;
            font-size: 1.2em;
            color: var(--sand);
            margin: 4px 0 10px;
            line-height: 1.25;
        }
        .linea-divisoria {
            border-top: 1.5px dashed var(--line);
            margin: 16px 0;
        }
        .casillero {
            background: var(--basalt-1);
            border-radius: 12px;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid var(--line);
        }
        .casillero .nombre-jugador {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 1.2em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--line);
        }
        .casillero .seccion {
            margin-top: 8px;
        }
        .casillero .seccion-titulo {
            font-size: 0.8em;
            text-transform: uppercase;
            color: var(--sand-dim);
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .casillero .seccion-titulo .contador {
            color: var(--ochre-light);
            font-weight: 700;
        }
        .casillero .tarjetas {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .casillero .tarjeta {
            background: var(--basalt-2);
            border-radius: 12px;
            padding: 4px 10px;
            font-size: 0.75em;
            border: 1px solid var(--line);
            white-space: nowrap;
            cursor: default;
        }
        .casillero .tarjeta.taifa {
            border-color: var(--terracota);
            color: var(--terracota-light);
        }
        .casillero .tarjeta.comodin {
            border-color: var(--ochre);
            color: var(--ochre-light);
        }
        .btn-comodin {
            background: var(--ochre);
            color: var(--basalt-0);
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75em;
            margin-top: 4px;
            border: none;
            cursor: pointer;
        }
        .btn-comodin:active { transform: scale(0.95); }
        .toast {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--basalt-2);
            color: var(--sand);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--ochre);
            z-index: 1000;
            font-size: 0.85em;
            max-width: 90%;
            text-align: center;
            animation: subir 0.25s ease;
        }
        @keyframes subir {
            from { opacity: 0; transform: translate(-50%, 15px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .clasificacion-final {
            border: 2px solid var(--ochre);
            border-radius: 16px;
            padding: 18px;
            margin-top: 12px;
            background: rgba(212, 160, 23, 0.08);
            text-align: center;
        }
        .clasificacion-final h2 { font-family: 'Fraunces', serif; color: var(--ochre-light); margin-bottom: 4px; }
        .clasificacion-final p { color: var(--sand-dim); font-size: 0.85em; margin-bottom: 14px; }
        .modal-comodin {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-comodin.visible { display: flex; }
        .modal-comodin .contenido {
            background: var(--basalt-1);
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            border: 2px solid var(--ochre);
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-comodin .contenido h3 {
            font-family: 'Fraunces', serif;
            color: var(--ochre-light);
            margin-bottom: 12px;
        }
        .modal-comodin .opcion {
            padding: 10px;
            background: var(--basalt-2);
            border-radius: 10px;
            margin: 6px 0;
            cursor: pointer;
            border: 1px solid var(--line);
            transition: border-color 0.3s;
        }
        .modal-comodin .opcion:active { border-color: var(--ochre); }
        .modal-comodin .opcion .titulo { font-weight: 700; color: var(--sand); }
        .modal-comodin .opcion .descripcion { font-size: 0.8em; color: var(--sand-dim); }
        .btn-cerrar-modal {
            background: var(--terracota);
            color: var(--sand);
            padding: 10px;
            border-radius: 10px;
            margin-top: 12px;
            width: 100%;
            font-weight: 700;
        }
        @media (max-width: 480px) {
            body { padding: 10px; font-size: 14px; }
            h1 { font-size: 1.5em; }
            .casillero .tarjeta { font-size: 0.7em; }
        }
    </style>
</head>
<body>
    <h1>BAILANDO VENGO<span class="isla">El Gran Juego · Folclore Canario</span></h1>
    <p class="subtitulo">Estrategia, conocimientos y suerte para conseguir los bailes de Taifas</p>
    <div id="toastContainer"></div>

    <!-- MODAL DE COMODINES -->
    <div id="modalComodin" class="modal-comodin">
        <div class="contenido">
            <h3>⭐ Canjear comodines</h3>
            <div id="opcionesComodin"></div>
            <button class="btn-cerrar-modal" onclick="cerrarModalComodin()">Cerrar</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- NAVEGACIÓN (9 BOTONES)                                        -->

        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">

            </a>
            <a href="modalidad_adivina.html" style="flex: 1; min-width: 120px; text-decoration: none;">

    <!-- PANEL DE JUGADORES                                             -->

    <div class="panel">

        <div class="fila-botones">
            <button class="btn-secundario" onclick="añadirJugador()">➕ Añadir</button>
            <button class="btn-secundario" onclick="barajarOrden()">🔀 Barajar</button>

        </div>
        <div id="listaJugadores" style="margin-top:10px;"></div>
    </div>

    <!-- ============================================================ -->
    <!-- PANEL DE PARTIDA                                               -->
    <!-- ============================================================ -->
    <div class="panel">
        <div class="panel-titulo">🎲 Partida</div>
        <div id="infoPartida" style="font-size:0.85em; color:var(--sand-dim); margin-bottom:8px; text-align:center;">
            Mínimo 2 jugadores para empezar
        </div>
        <button class="btn-principal" onclick="iniciarPartida()" id="btnIniciarPartida">🎵 Iniciar BAILANDO VENGO</button>
        <div class="acciones-menores">
            <button class="btn-texto" onclick="terminarPartida()" id="btnTerminarPartida" style="display:none;">🏁 Terminar partida</button>
            <button class="btn-texto" onclick="exportarPartida()">💾 Guardar</button>
            <button class="btn-texto" onclick="cargarPartida()">📂 Cargar</button>
            <button class="btn-texto" onclick="reiniciarPartida()">🔄 Reiniciar</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ESTADO DEL JUEGO                                               -->
    <!-- ============================================================ -->
    <div id="estadoJuego" class="estado-juego" style="display:none;"></div>

    <!-- ============================================================ -->
    <!-- ZONA DE JUEGO (casillero + pruebas + botones)                -->
    <!-- ============================================================ -->
    <div id="zonaJuego" class="billete" style="display:none;">
        <div class="num" id="numeroInfo"></div>
        <h2 id="tituloInfo">🎯 Turno de <span id="nombreTurno"></span></h2>
        <div style="text-align:center; font-size:0.9em; color:var(--sand-dim);">
            Asistente: <span id="nombreAsistente" style="color:var(--ochre-light); font-weight:700;"></span>
        </div>

        <!-- CASILLERO DEL JUGADOR ACTIVO -->
        <div id="casilleroContainer" class="casillero"></div>

        <!-- BOTÓN SORTEAR PRUEBA -->
        <button class="btn-principal" onclick="sortearPrueba()" id="btnSortearPrueba" style="margin-top:12px;">
            🎲 Sortear prueba
        </button>

        <!-- BOTÓN BAILAR TAIFAS (se muestra cuando cumple requisitos) -->
        <button class="btn-principal" onclick="iniciarBaileTaifas()" id="btnBaileTaifas" style="display:none; margin-top:8px; background:var(--ochre); color:var(--basalt-0); box-shadow: 0 6px 0 #b38a14;">
            🏆 ¡Baile de Taifas!
        </button>

        <!-- ZONA DE PRUEBA (se muestra durante la prueba) -->
        <div id="zonaPrueba" style="display:none; margin-top:12px; padding:12px; background:var(--basalt-1); border-radius:10px;">
            <p id="mensajePrueba" style="font-weight:700;"></p>
            <div id="contenidoPrueba"></div>
            <button class="btn-principal" onclick="responderPrueba(true)" id="btnAcierto" style="margin-top:8px; background:var(--ocean);">✅ Acierto</button>
            <button class="btn-principal" onclick="responderPrueba(false)" id="btnFallo" style="margin-top:4px; background:var(--terracota);">❌ Fallo</button>
            <button class="btn-texto" onclick="cancelarPrueba()" style="display:block; margin-top:6px;">Cancelar prueba</button>
        </div>

        <!-- RESULTADO DE LA PRUEBA (se muestra tras responder) -->
        <div id="resultadoPrueba" style="display:none; margin-top:12px; padding:12px; background:var(--basalt-1); border-radius:10px;">
            <p id="resultadoMensaje" style="font-weight:700;"></p>
            <p id="resultadoDetalle" style="font-size:0.85em; color:var(--sand-dim);"></p>
        </div>

        <!-- BOTÓN SIGUIENTE TURNO -->
        <button class="btn-principal secundario" id="btnSiguienteTurno" style="display:none; margin-top:10px;" onclick="siguienteTurno()">
            ➜ Siguiente turno
        </button>
    </div>

        // ============================================================

        function mostrarToast(mensaje) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = mensaje;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }

        function mezclarArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getJugadorActivo() {
            return jugadores[turnoActual] || null;
        }

        function getAsistente() {
            if (jugadores.length < 2) return null;
            const idx = (turnoActual + 1) % jugadores.length;
            return jugadores[idx];
        }

        function inicializarMazos() {
            mazos = {
                bailes: BAILES.map(b => ({ ...b })),
                preguntas: PREGUNTAS.map(p => ({ ...p })),
                vestimentas: VESTIMENTAS.map(v => ({ ...v })),
                coplas: COPLAS.map(c => ({ ...c })),
            };
            Object.keys(mazos).forEach(key => mezclarArray(mazos[key]));
        }

        // ============================================================
        // FUNCIONES DE JUGADORES
        // ============================================================
        function añadirJugador() {
            if (partidaActiva) {
                mostrarToast("⚠️ La partida ya está en curso.");
                return;
            }
            const input = document.getElementById("nombreJugador");
            const nombre = input.value.trim();
            if (!nombre) {
                mostrarToast("Escribe un nombre primero.");
                return;
            }
            if (jugadores.some(j => j.nombre === nombre)) {
                mostrarToast("Ese jugador ya está en la lista.");
                return;
            }
            const color = COLORES[colorIndex % COLORES.length];
            colorIndex++;
            jugadores.push({
                nombre,
                color,
                casillero: {
                    bailes: [],
                    preguntas: [],
                    vestimentas: [],
                    coplas: [],
                    comodines: [],
                    taifasLogrados: [],
                },
                asistenteElegido: null, // para comodín de cambiar asistente
            });
            input.value = "";
            actualizarListaJugadores();
            guardarPartidaAuto();
            mostrarToast(`✅ ${nombre} añadido.`);
        }

        function eliminarJugadores() {
            if (partidaActiva) {
                mostrarToast("⚠️ La partida está en curso.");
                return;
            }
            if (!confirm("¿Vaciar la lista de jugadores?")) return;
            jugadores = [];
            colorIndex = 0;
            actualizarListaJugadores();
            document.getElementById("zonaJuego").style.display = "none";
            guardarPartidaAuto();
        }

        function barajarOrden() {
            if (jugadores.length < 2) {
                mostrarToast("Necesitas al menos 2 jugadores.");
                return;

            mezclarArray(jugadores);
            actualizarListaJugadores();
            mostrarToast("🔀 Orden barajado.");
            guardarPartidaAuto();
        }

        function actualizarListaJugadores() {
            const container = document.getElementById("listaJugadores");
            if (jugadores.length === 0) {
                container.innerHTML = "<p style='color:var(--sand-dim); font-size:0.85em;'>No hay jugadores todavía.</p>";
                return;
            }
            let html = "";
            jugadores.forEach((j, index) => {
                const esTurno = (partidaActiva && index === turnoActual);
                html += `<div class="jugador-item ${esTurno ? 'turno' : ''}" style="border-color:${esTurno ? j.color : 'var(--line)'};">${index + 1}. ${j.nombre}</div>`;
            });
            container.innerHTML = html;

            const info = document.getElementById("infoPartida");
            if (jugadores.length < 2) {
                info.textContent = `Mínimo 2 jugadores para empezar (actual: ${jugadores.length})`;
                info.style.color = "var(--terracota-light)";
            } else {
                info.textContent = `${jugadores.length} jugadores listos para jugar`;
                info.style.color = "var(--ocean-light)";
            }
        }

        // ============================================================

        // ============================================================
        function iniciarPartida() {
            if (jugadores.length < 2) {
                mostrarToast("❌ Necesitas al menos 2 jugadores.");
                return;
            }
            if (partidaActiva) {
                mostrarToast("⚠️ Ya hay una partida en curso.");
                return;
            }

            jugadores.forEach(j => {
                j.casillero = {
                    bailes: [],
                    preguntas: [],
                    vestimentas: [],
                    coplas: [],
                    comodines: [],
                    taifasLogrados: [],
                };
                j.asistenteElegido = null;
            });

            inicializarMazos();
            partidaActiva = true;
            turnoActual = 0;
            ronda = 0;
            historial = [];
            pruebaActual = null;
            votacionTaifas = null;

            document.getElementById("btnIniciarPartida").style.display = "none";
            document.getElementById("btnTerminarPartida").style.display = "inline-block";
            document.getElementById("zonaJuego").style.display = "block";

            mostrarEstado('turno', `🎯 Ronda ${ronda + 1} - Turno de ${jugadores[turnoActual].nombre}`);
            mostrarTurno();
            guardarPartidaAuto();
            mostrarToast("🎵 ¡Comienza BAILANDO VENGO!");
        }

        function mostrarTurno() {
            const jugador = getJugadorActivo();
            const asistente = getAsistente();
            if (!jugador) return;

            document.getElementById("numeroInfo").textContent = `RONDA ${ronda + 1}`;
            document.getElementById("tituloInfo").innerHTML = `🎯 Turno de <span style="color:${jugador.color}">${jugador.nombre}</span>`;
            document.getElementById("nombreTurno").textContent = jugador.nombre;
            document.getElementById("nombreAsistente").textContent = asistente ? asistente.nombre : "Sin asistente";

            mostrarCasillero(jugador);

            // Comprobar si cumple requisitos para Baile de Taifas
            const puedeTaifas = comprobarRequisitosTaifas(jugador);
            document.getElementById("btnBaileTaifas").style.display = puedeTaifas ? 'block' : 'none';

            document.getElementById("btnSortearPrueba").disabled = false;
            document.getElementById("btnSortearPrueba").style.display = "block";
            document.getElementById("zonaPrueba").style.display = "none";
            document.getElementById("resultadoPrueba").style.display = "none";
            document.getElementById("btnSiguienteTurno").style.display = "none";

            actualizarListaJugadores();
        }

        // ============================================================
        // REQUISITOS PARA BAILE DE TAIFAS
        // ============================================================
        function comprobarRequisitosTaifas(jugador) {
            const c = jugador.casillero;
            if (c.bailes.length < 5) return false;
            if (c.preguntas.length < 1) return false;
            if (c.vestimentas.length < 1) return false;
            if (c.coplas.length < 1) return false;
            if (c.comodines.length < 1) return false;
            // Debe tener al menos un lugar sin conseguir
            const lugaresConseguidos = c.taifasLogrados;
            const lugaresPendientes = LUGARES_TAIFAS.filter(l => !lugaresConseguidos.includes(l));
            return lugaresPendientes.length > 0;
        }

        function sortearPrueba() {
            if (!partidaActiva) return;
            const jugador = getJugadorActivo();
            if (!jugador) return;

            // Tipos de prueba disponibles (todas)
            const tipos = ['ver', 'escuchar', 'mimica', 'pregunta', 'vestimenta', 'copla'];
            // Elegir uno al azar
            const tipo = tipos[Math.floor(Math.random() * tipos.length)];

            let carta = null;
            let mazoKey = '';
            let emoji = '';
            let seccion = '';

            switch (tipo) {
                case 'ver':
                case 'escuchar':
                case 'mimica':
                    mazoKey = 'bailes';
                    emoji = '🕺';
                    seccion = 'bailes';
                    break;
                case 'pregunta':
                    mazoKey = 'preguntas';
                    emoji = '❓';
                    seccion = 'preguntas';
                    break;
                case 'vestimenta':
                    mazoKey = 'vestimentas';
                    emoji = '👗';
                    seccion = 'vestimentas';
                    break;
                case 'copla':
                    mazoKey = 'coplas';
                    emoji = '🎶';
                    seccion = 'coplas';
                    break;
            }

            if (mazos[mazoKey] && mazos[mazoKey].length > 0) {
                carta = mazos[mazoKey].pop();
            } else {
                // Si el mazo está vacío, rellenar con las cartas que no están en los casilleros
                recargarMazo(mazoKey);
                if (mazos[mazoKey].length === 0) {
                    mostrarToast("⚠️ No quedan cartas de ese tipo. No se puede realizar la prueba.");
                    return;
                }
                carta = mazos[mazoKey].pop();
            }

            // Guardar la prueba actual
            pruebaActual = {
                tipo,
                carta,
                seccion,
                mazoKey,
                emoji,
                jugador: jugador,
                asistente: getAsistente(),
                respondida: false,
                exito: null,
            };

            // Mostrar la prueba
            mostrarPrueba(pruebaActual);
        }

        function recargarMazo(mazoKey) {
            // Recoger todas las cartas que no están en ningún casillero
            const todas = mazos[mazoKey];
            const enUso = [];
            jugadores.forEach(j => {
                const seccion = j.casillero[mazoKey === 'bailes' ? 'bailes' : mazoKey === 'preguntas' ? 'preguntas' : mazoKey === 'vestimentas' ? 'vestimentas' : 'coplas'];
                enUso.push(...seccion.map(c => c.id));
            });
            const disponibles = todas.filter(c => !enUso.includes(c.id));
            mazos[mazoKey] = mezclarArray(disponibles);
        }

        // ============================================================
        // MOSTRAR PRUEBA
        // ============================================================
        function mostrarPrueba(prueba) {
            const zona = document.getElementById("zonaPrueba");
            zona.style.display = "block";
            const mensaje = document.getElementById("mensajePrueba");
            const contenido = document.getElementById("contenidoPrueba");

            const { tipo, carta, emoji, jugador, asistente } = prueba;

            mensaje.textContent = `${emoji} Prueba de ${tipo.toUpperCase()}`;
            mensaje.style.color = "var(--ochre-light)";

            let html = '';
            let nombreCarta = carta.nombre || carta.titulo || `ID ${carta.id}`;

            if (tipo === 'ver' || tipo === 'escuchar' || tipo === 'mimica') {
                html = `
                    <p style="font-size:0.85em; color:var(--sand-dim);">🎬 <a href="${carta.enlace}" target="_blank" style="color:var(--ocean-light);">Ver vídeo</a></p>
                    <p style="font-size:0.85em; color:var(--sand-dim);">${tipo === 'ver' ? '👀 Mira sin sonido' : tipo === 'escuchar' ? '👂 Escucha sin ver' : '💆 Haz mímica'}</p>
                    <p style="font-size:0.9em; color:var(--sand);">¿Cuál es el baile?</p>
                `;
            } else if (tipo === 'pregunta') {
                const opciones = carta.opciones.map((op, i) => `${String.fromCharCode(65 + i)}) ${op}`).join(' · ');
                html = `
                    <p style="font-size:1em; color:var(--sand);">${carta.pregunta}</p>
                    <p style="font-size:0.85em; color:var(--sand-dim);">${opciones}</p>
                    <p style="font-size:0.85em; color:var(--sand-dim);">Responde con la letra (A, B, C...)</p>
                `;
            } else if (tipo === 'vestimenta') {
                html = `
                    <p style="font-size:0.85em; color:var(--sand-dim);">👗 <a href="${carta.enlace}" target="_blank" style="color:var(--ocean-light);">Ver vestimenta</a></p>
                    <p style="font-size:0.85em; color:var(--sand-dim);">¿De qué isla es?</p>
                `;
            } else if (tipo === 'copla') {
                const textoConHuecos = carta.texto.replace(/\.{5,}/g, '_____');
                html = `
                    <p style="font-size:0.95em; color:var(--sand);">${textoConHuecos}</p>
                    <p style="font-size:0.85em; color:var(--sand-dim);">Completa las palabras que faltan (${carta.palabras.length} palabras)</p>
                    <p style="font-size:0.8em; color:var(--sand-dim);">El asistente puede ver la copla completa en el enlace</p>
                    <p style="font-size:0.8em; color:var(--sand-dim);">🔗 <a href="${carta.enlace}" target="_blank" style="color:var(--ocean-light);">Ver copla (solo asistente)</a></p>
                `;
            }

            contenido.innerHTML = html;

            // Mostrar botones de acierto/fallo
            document.getElementById("btnAcierto").style.display = "block";
            document.getElementById("btnFallo").style.display = "block";

            document.getElementById("btnSortearPrueba").disabled = true;
            document.getElementById("btnSortearPrueba").style.display = "none";
            document.getElementById("resultadoPrueba").style.display = "none";
            document.getElementById("btnSiguienteTurno").style.display = "none";
        }

        // ============================================================
        // RESPONDER PRUEBA
        // ============================================================
        function responderPrueba(exito) {
            if (!pruebaActual || pruebaActual.respondida) return;
            pruebaActual.respondida = true;
            pruebaActual.exito = exito;

            const { tipo, carta, seccion, mazoKey, emoji, jugador, asistente } = pruebaActual;

            // Ocultar zona de prueba
            document.getElementById("zonaPrueba").style.display = "none";

            // Mostrar resultado
            const resultadoDiv = document.getElementById("resultadoPrueba");
            resultadoDiv.style.display = "block";
            const mensaje = document.getElementById("resultadoMensaje");
            const detalle = document.getElementById("resultadoDetalle");

            if (exito) {
                mensaje.textContent = `✅ ¡${jugador.nombre} ha superado la prueba!`;
                mensaje.style.color = "var(--ocean-light)";
                detalle.textContent = `${emoji} ${tipo.toUpperCase()} - Carta: ${carta.nombre || carta.titulo || `ID ${carta.id}`}`;

                // Añadir al casillero del jugador
                const casillero = jugador.casillero;
                let añadida = false;
                if (seccion === 'bailes' && casillero.bailes.length < 5) {
                    casillero.bailes.push(carta);
                    añadida = true;
                } else if (seccion === 'preguntas' && casillero.preguntas.length < 3) {
                    casillero.preguntas.push(carta);
                    añadida = true;
                } else if (seccion === 'vestimentas' && casillero.vestimentas.length < 3) {
                    casillero.vestimentas.push(carta);
                    añadida = true;
                } else if (seccion === 'coplas' && casillero.coplas.length < 3) {
                    casillero.coplas.push(carta);
                    añadida = true;
                }

                if (!añadida) {
                    detalle.textContent += ' (no se añadió porque la sección está llena)';
                    // Devolver la carta al mazo
                    mazos[mazoKey].push(carta);
                } else {
                    // El asistente gana un comodín
                    if (asistente && asistente.casillero.comodines.length < 5) {
                        asistente.casillero.comodines.push({ id: Date.now() + Math.random() });
                        detalle.textContent += ` ⭐ ${asistente.nombre} gana un comodín.`;
                    }
                }

                // Registrar en historial
                historial.push({
                    ronda: ronda + 1,
                    jugador: jugador.nombre,
                    tipo: tipo,
                    exito: true,
                    carta: carta.id
                });

            } else {
                mensaje.textContent = `❌ ${jugador.nombre} ha fallado la prueba.`;
                mensaje.style.color = "var(--terracota-light)";
                detalle.textContent = `${emoji} ${tipo.toUpperCase()} - Carta: ${carta.nombre || carta.titulo || `ID ${carta.id}`} (no se añade)`;
                // La carta vuelve al mazo
                mazos[mazoKey].push(carta);

                historial.push({
                    ronda: ronda + 1,
                    jugador: jugador.nombre,
                    tipo: tipo,
                    exito: false,
                    carta: carta.id
                });
            }

            // Actualizar casillero
            mostrarCasillero(jugador);

            // Verificar si ya completó todos los Taifas
            if (jugador.casillero.taifasLogrados.length === LUGARES_TAIFAS.length) {
                mostrarToast(`🏆 ¡${jugador.nombre} ha ganado la partida!`);
                finalizarPartida();
                return;
            }

            // Mostrar botón siguiente turno
            document.getElementById("btnSiguienteTurno").style.display = "block";

            // Limpiar prueba actual
            pruebaActual = null;
            guardarPartidaAuto();
        }

        function cancelarPrueba() {
            if (!pruebaActual) return;
            // Devolver la carta al mazo
            const { carta, mazoKey } = pruebaActual;
            mazos[mazoKey].push(carta);
            pruebaActual = null;
            document.getElementById("zonaPrueba").style.display = "none";
            document.getElementById("btnSortearPrueba").disabled = false;
            document.getElementById("btnSortearPrueba").style.display = "block";
            mostrarToast("Prueba cancelada.");
        }

        // ============================================================
        // BAILE DE TAIFAS
        // ============================================================
        function iniciarBaileTaifas() {
            const jugador = getJugadorActivo();
            if (!jugador) return;
            if (!comprobarRequisitosTaifas(jugador)) {
                mostrarToast("⚠️ No cumples los requisitos para un Baile de Taifas.");
                return;
            }

            // Elegir un lugar pendiente
            const pendientes = LUGARES_TAIFAS.filter(l => !jugador.casillero.taifasLogrados.includes(l));
            if (pendientes.length === 0) {
                mostrarToast("🏆 ¡Ya has conseguido todos los lugares!");
                return;
            }

            // Mostrar modal para elegir lugar y bailes
            const lugar = pendientes[Math.floor(Math.random() * pendientes.length)]; // Simulación: elegir aleatorio

            // Elegir 3 bailes de los 5 que tiene
            const bailesDisponibles = jugador.casillero.bailes;
            const elegidos = bailesDisponibles.slice(0, 3); // Simulación: los 3 primeros

            // Iniciar votación
            votacionTaifas = {
                jugador: jugador,
                lugar: lugar,
                bailesElegidos: elegidos,
                votos: [],
                votantesPendientes: jugadores.filter(j => j.nombre !== jugador.nombre),
                indiceVotante: 0,
            };

            mostrarToast(`🎵 ${jugador.nombre} intenta conseguir ${lugar} con los bailes: ${elegidos.map(b => b.nombre).join(', ')}`);
            iniciarVotacionTaifas();
        }

        function iniciarVotacionTaifas() {
            if (!votacionTaifas) return;
            const { jugador, lugar, bailesElegidos, votantesPendientes, indiceVotante } = votacionTaifas;

            if (indiceVotante >= votantesPendientes.length) {
                // Fin de la votación
                finalizarVotacionTaifas();
                return;
            }

            const votante = votantesPendientes[indiceVotante];
            mostrarToast(`🗳️ ${votante.nombre}, vota si ${jugador.nombre} ha bailado bien.`);

            // Mostrar botones de votación en el área de prueba (reutilizamos)
            const zona = document.getElementById("zonaPrueba");
            zona.style.display = "block";
            document.getElementById("mensajePrueba").textContent = `🗳️ Votación de Taifas - ${lugar}`;
            document.getElementById("mensajePrueba").style.color = "var(--ochre-light)";
            document.getElementById("contenidoPrueba").innerHTML = `
                <p style="font-size:0.9em; color:var(--sand);">${votante.nombre}, ¿${jugador.nombre} ha bailado bien?</p>
                <p style="font-size:0.8em; color:var(--sand-dim);">Bailes: ${bailesElegidos.map(b => b.nombre).join(', ')}</p>
            `;

            // Cambiar botones de acierto/fallo para votación
            document.getElementById("btnAcierto").style.display = "block";
            document.getElementById("btnAcierto").textContent = "👍 Sí";
            document.getElementById("btnAcierto").onclick = () => votarTaifas(true);
            document.getElementById("btnFallo").style.display = "block";
            document.getElementById("btnFallo").textContent = "👎 No";
            document.getElementById("btnFallo").onclick = () => votarTaifas(false);
        }

        function votarTaifas(aprobado) {
            if (!votacionTaifas) return;
            const { votantesPendientes, indiceVotante } = votacionTaifas;
            const votante = votantesPendientes[indiceVotante];
            votacionTaifas.votos.push({ votante: votante.nombre, aprobado });
            votacionTaifas.indiceVotante++;
            // Ocultar botones de votación
            document.getElementById("btnAcierto").style.display = "none";
            document.getElementById("btnFallo").style.display = "none";
            document.getElementById("zonaPrueba").style.display = "none";
            // Siguiente votante
            setTimeout(iniciarVotacionTaifas, 500);
        }

        function finalizarVotacionTaifas() {
            const { jugador, lugar, bailesElegidos, votos } = votacionTaifas;
            const aprobados = votos.filter(v => v.aprobado).length;
            const total = votos.length;
            const exito = aprobados > total / 2;

            if (exito) {
                jugador.casillero.taifasLogrados.push(lugar);
                // Descontar los 3 bailes, 1 pregunta, 1 vestimenta, 1 copla, 1 comodín
                const c = jugador.casillero;
                // Eliminar los 3 bailes usados
                bailesElegidos.forEach(b => {
                    const idx = c.bailes.findIndex(item => item.id === b.id);
                    if (idx !== -1) c.bailes.splice(idx, 1);
                });
                // Eliminar 1 pregunta
                if (c.preguntas.length > 0) c.preguntas.splice(0, 1);
                // Eliminar 1 vestimenta
                if (c.vestimentas.length > 0) c.vestimentas.splice(0, 1);
                // Eliminar 1 copla
                if (c.coplas.length > 0) c.coplas.splice(0, 1);
                // Eliminar 1 comodín
                if (c.comodines.length > 0) c.comodines.splice(0, 1);

                mostrarToast(`🏆 ¡${jugador.nombre} ha conseguido ${lugar}!`);
                historial.push({
                    ronda: ronda + 1,
                    jugador: jugador.nombre,
                    tipo: 'taifas',
                    exito: true,
                    lugar: lugar
                });

                // Devolver las cartas a los mazos
                bailesElegidos.forEach(b => mazos.bailes.push(b));
                // Las otras cartas ya se eliminaron del casillero, se pueden devolver a sus mazos
                // (En una implementación real, habría que devolver las cartas específicas, pero aquí simplificamos)
                recargarMazo('preguntas');
                recargarMazo('vestimentas');
                recargarMazo('coplas');

                // Verificar si completó todos los Taifas
                if (jugador.casillero.taifasLogrados.length === LUGARES_TAIFAS.length) {
                    mostrarToast(`🏆 ¡${jugador.nombre} ha ganado la partida!`);
                    finalizarPartida();
                    return;
                }

            } else {
                mostrarToast(`❌ ${jugador.nombre} no ha conseguido ${lugar}.`);
                historial.push({
                    ronda: ronda + 1,
                    jugador: jugador.nombre,
                    tipo: 'taifas',
                    exito: false,
                    lugar: lugar
                });
            }

            votacionTaifas = null;
            // Volver al turno normal
            document.getElementById("zonaPrueba").style.display = "none";
            document.getElementById("btnSiguienteTurno").style.display = "block";
            mostrarCasillero(jugador);
            guardarPartidaAuto();
        }

        // ============================================================
        // SIGUIENTE TURNO
        // ============================================================
        function siguienteTurno() {
            if (!partidaActiva) return;

            // Avanzar al siguiente jugador
            turnoActual = (turnoActual + 1) % jugadores.length;
            if (turnoActual === 0) {
                ronda++;
            }

            mostrarEstado('turno', `🎯 Ronda ${ronda + 1} - Turno de ${jugadores[turnoActual].nombre}`);
            mostrarTurno();
            guardarPartidaAuto();
        }

        // ============================================================
        // COMODINES (MODAL)
        // ============================================================
        function abrirModalComodin() {
            const jugador = getJugadorActivo();
            if (!jugador) return;
            if (jugador.casillero.comodines.length === 0) {
                mostrarToast("No tienes comodines.");
                return;
            }

            const modal = document.getElementById("modalComodin");
            modal.classList.add("visible");
            const container = document.getElementById("opcionesComodin");
            container.innerHTML = `
                <div class="opcion" onclick="usarComodin('doble_tiempo')">
                    <div class="titulo">⏱️ Doblar tiempo (1 comodín)</div>
                    <div class="descripcion">Duplica el tiempo de la próxima prueba.</div>
                </div>
                <div class="opcion" onclick="usarComodin('repetir')">
                    <div class="titulo">🔄 Repetir prueba (2 comodines)</div>
                    <div class="descripcion">Si fallas, puedes volver a intentar con otra carta.</div>
                </div>
                <div class="opcion" onclick="usarComodin('comprar')">
                    <div class="titulo">🃏 Comprar tarjeta (2 comodines)</div>
                    <div class="descripcion">Obtén una carta de pregunta, vestimenta o copla.</div>
                </div>
                <div class="opcion" onclick="usarComodin('cambiar_asistente')">
                    <div class="titulo">🔄 Cambiar asistente (2 comodines)</div>
                    <div class="descripcion">Elige a otro jugador como tu asistente.</div>
                </div>
            `;
        }

        function cerrarModalComodin() {
            document.getElementById("modalComodin").classList.remove("visible");
        }

        function usarComodin(tipo) {
            const jugador = getJugadorActivo();
            if (!jugador) return;

            let costo = 0;
            switch (tipo) {
                case 'doble_tiempo': costo = 1; break;
                case 'repetir': costo = 2; break;
                case 'comprar': costo = 2; break;
                case 'cambiar_asistente': costo = 2; break;
                default: return;
            }

            if (jugador.casillero.comodines.length < costo) {
                mostrarToast(`Necesitas ${costo} comodines.`);
                return;
            }

            // Consumir comodines
            for (let i = 0; i < costo; i++) {
                jugador.casillero.comodines.pop();
            }

            let mensaje = '';
            switch (tipo) {
                case 'doble_tiempo':
                    // Aquí se aplicaría el doble de tiempo en la próxima prueba
                    // Por simplicidad, guardamos un flag en el jugador
                    jugador.tiempoDoble = true;
                    mensaje = '⏱️ Próxima prueba con tiempo doble.';
                    break;
                case 'repetir':
                    // Permitir repetir la prueba actual si ha fallado
                    if (pruebaActual && pruebaActual.respondida && !pruebaActual.exito) {
                        // Reiniciar la prueba con otra carta
                        const { tipo: tipoPrueba, mazoKey } = pruebaActual;
                        if (mazos[mazoKey].length > 0) {
                            const nuevaCarta = mazos[mazoKey].pop();
                            pruebaActual.carta = nuevaCarta;
                            pruebaActual.respondida = false;
                            pruebaActual.exito = null;
                            mostrarPrueba(pruebaActual);
                            mensaje = '🔄 Nueva carta para repetir la prueba.';
                        } else {
                            mensaje = 'No hay cartas disponibles para repetir.';
                        }
                    } else {
                        mensaje = 'No puedes usar repetir ahora. Debes haber fallado una prueba.';
                    }
                    break;
                case 'comprar':
                    // Comprar una carta aleatoria de pregunta, vestimenta o copla
                    const tipos = ['preguntas', 'vestimentas', 'coplas'];
                    const tipoCompra = tipos[Math.floor(Math.random() * tipos.length)];
                    if (mazos[tipoCompra].length > 0) {
                        const carta = mazos[tipoCompra].pop();
                        const seccion = tipoCompra === 'preguntas' ? 'preguntas' : tipoCompra === 'vestimentas' ? 'vestimentas' : 'coplas';
                        const casillero = jugador.casillero;
                        if (casillero[seccion].length < (seccion === 'preguntas' ? 3 : 3)) {
                            casillero[seccion].push(carta);
                            mensaje = `🃏 Has comprado una carta de ${tipoCompra.slice(0, -1)}.`;
                        } else {
                            mensaje = `No tienes espacio para más ${tipoCompra}.`;
                            mazos[tipoCompra].push(carta);
                        }
                    } else {
                        mensaje = 'No hay cartas disponibles para comprar.';
                    }
                    break;
                case 'cambiar_asistente':
                    // Elegir un nuevo asistente entre los otros jugadores
                    const otros = jugadores.filter(j => j.nombre !== jugador.nombre);
                    if (otros.length > 0) {
                        const elegido = otros[Math.floor(Math.random() * otros.length)];
                        // Guardar el asistente elegido para este turno
                        jugador.asistenteElegido = elegido.nombre;
                        mensaje = `🔄 Ahora tu asistente es ${elegido.nombre}.`;
                        // Actualizar la visualización
                        document.getElementById("nombreAsistente").textContent = elegido.nombre;
                    } else {
                        mensaje = 'No hay otros jugadores para ser asistente.';
                    }
                    break;
            }

            mostrarToast(mensaje);
            cerrarModalComodin();
            mostrarCasillero(jugador);
            guardarPartidaAuto();
        }

        // ============================================================
        // TERMINAR PARTIDA
        // ============================================================
        function terminarPartida() {
            if (!partidaActiva) {
                mostrarToast("⚠️ No hay una partida activa.");
                return;
            }
            if (!confirm("¿Terminar la partida? Se mostrará la clasificación final.")) return;
            finalizarPartida();
        }

        function finalizarPartida() {
            partidaActiva = false;
            mostrarEstado('final', '🏆 ¡Partida finalizada!');

            const ordenados = [...jugadores].sort((a, b) => b.casillero.taifasLogrados.length - a.casillero.taifasLogrados.length);
            const container = document.getElementById("casilleroContainer");
            let html = `<div class="clasificacion-final">
                            <h2>🏆 Clasificación Final</h2>
                            <p>${historial.length} pruebas realizadas</p>`;
            ordenados.forEach((j, index) => {
                const medalla = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index+1}`;
                html += `<div class="clasificacion-item">
                            <span class="posicion">${medalla}</span>
                            <span class="nombre" style="color:${j.color};">${j.nombre}</span>
                            <span class="puntos">${j.casillero.taifasLogrados.length} taifas</span>
                        </div>`;
            });
            html += `<button class="btn-principal" style="margin-top:14px;" onclick="reiniciarPartida()">🔄 Nueva partida</button>`;
            html += `</div>`;
            container.innerHTML = html;

            document.getElementById("zonaJuego").style.display = "block";
            document.getElementById("btnSortearPrueba").style.display = "none";
            document.getElementById("btnSiguienteTurno").style.display = "none";
            document.getElementById("btnIniciarPartida").style.display = "block";
            document.getElementById("btnIniciarPartida").textContent = "🎵 Nueva partida";
            document.getElementById("btnTerminarPartida").style.display = "none";

            guardarPartidaAuto();
        }

        // ============================================================
        // REINICIAR PARTIDA
        // ============================================================
        function reiniciarPartida() {
            if (!confirm("¿Reiniciar toda la partida?")) return;

            partidaActiva = false;
            jugadores.forEach(j => {
                j.casillero = {
                    bailes: [],
                    preguntas: [],
                    vestimentas: [],
                    coplas: [],
                    comodines: [],
                    taifasLogrados: [],
                };
                j.asistenteElegido = null;
            });
            turnoActual = 0;
            ronda = 0;
            historial = [];
            colorIndex = 0;
            pruebaActual = null;
            votacionTaifas = null;

            document.getElementById("zonaJuego").style.display = "none";
            document.getElementById("btnIniciarPartida").style.display = "block";
            document.getElementById("btnIniciarPartida").textContent = "🎵 Iniciar BAILANDO VENGO";
            document.getElementById("btnTerminarPartida").style.display = "none";
            document.getElementById("estadoJuego").style.display = "none";

            actualizarListaJugadores();
            guardarPartidaAuto();
            mostrarToast("🔄 Partida reiniciada.");
        }

        function mostrarEstado(tipo, mensaje) {
            const el = document.getElementById("estadoJuego");
            el.style.display = "block";
            el.className = "estado-juego " + tipo;
            el.textContent = mensaje;
        }

        // ============================================================
        // GUARDADO Y CARGA
        // ============================================================
        function guardarPartidaAuto() {
            try {
                const datos = {
                    jugadores,
                    partidaActiva,
                    turnoActual,
                    ronda,
                    mazos,
                    historial,
                    pruebaActual,
                    votacionTaifas
                };
                localStorage.setItem('granJuegoPartida', JSON.stringify(datos));
            } catch (e) { console.log('No se pudo autoguardar:', e); }
        }

        function cargarPartidaAuto() {
            try {
                const datos = localStorage.getItem('granJuegoPartida');
                if (!datos) return;
                const parsed = JSON.parse(datos);
                if (!parsed.jugadores || parsed.jugadores.length === 0) return;

                jugadores = parsed.jugadores;
                partidaActiva = parsed.partidaActiva || false;
                turnoActual = parsed.turnoActual || 0;
                ronda = parsed.ronda || 0;
                mazos = parsed.mazos || {};
                historial = parsed.historial || [];
                pruebaActual = parsed.pruebaActual || null;
                votacionTaifas = parsed.votacionTaifas || null;

                actualizarListaJugadores();

                if (partidaActiva) {
                    document.getElementById("btnIniciarPartida").style.display = "none";
                    document.getElementById("btnTerminarPartida").style.display = "inline-block";
                    document.getElementById("zonaJuego").style.display = "block";
                    mostrarEstado('turno', `🎯 Ronda ${ronda + 1} - Turno de ${jugadores[turnoActual].nombre}`);
                    mostrarTurno();
                    if (pruebaActual && !pruebaActual.respondida) {
                        mostrarPrueba(pruebaActual);
                    }
                    if (votacionTaifas) {
                        iniciarVotacionTaifas();
                    }
                }
                console.log('✅ Partida de Gran Juego cargada automáticamente');
            } catch (e) { console.log('Error cargando partida:', e); }
        }

        function exportarPartida() {
            const datos = {
                jugadores,
                partidaActiva,
                turnoActual,
                ronda,
                mazos,
                historial,
                pruebaActual,
                votacionTaifas,
                fecha: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(datos, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `granjuego_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            mostrarToast("💾 Partida exportada.");
        }

        function cargarPartida() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const datos = JSON.parse(event.target.result);
                        jugadores = datos.jugadores || [];
                        partidaActiva = datos.partidaActiva || false;
                        turnoActual = datos.turnoActual || 0;
                        ronda = datos.ronda || 0;
                        mazos = datos.mazos || {};
                        historial = datos.historial || [];
                        pruebaActual = datos.pruebaActual || null;
                        votacionTaifas = datos.votacionTaifas || null;

                        actualizarListaJugadores();

                        if (partidaActiva) {
                            document.getElementById("btnIniciarPartida").style.display = "none";
                            document.getElementById("btnTerminarPartida").style.display = "inline-block";
                            document.getElementById("zonaJuego").style.display = "block";
                            mostrarEstado('turno', `🎯 Ronda ${ronda + 1} - Turno de ${jugadores[turnoActual].nombre}`);
                            mostrarTurno();
                            if (pruebaActual && !pruebaActual.respondida) {
                                mostrarPrueba(pruebaActual);
                            }
                            if (votacionTaifas) {
                                iniciarVotacionTaifas();
                            }
                        }
                        guardarPartidaAuto();
                        mostrarToast("📂 Partida cargada.");
                    } catch (e) {
                        mostrarToast("Error al leer el archivo.");
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // ============================================================
        // INICIO DE LA APLICACIÓN
        // ============================================================
        function iniciarApp() {
            cargarPartidaAuto();
            actualizarListaJugadores();
            console.log('✅ App "BAILANDO VENGO" iniciada.');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', iniciarApp);
        } else {
            iniciarApp();
        }
    </script>
</body>
</html>
